<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usanim Pro - Premium Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-dark: #064e3b;
            --accent-emerald: #059669;
            --soft-emerald: #a7f3d0;
        }

        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
            background-color: var(--primary-dark); 
            user-select: none; 
            touch-action: pan-y; 
            color: white; 
            overflow-x: hidden; 
            height: 100vh; 
            margin: 0; 
        }

        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .home-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; 
            border-left: 12px solid var(--accent-emerald); 
            background: #065f46; 
        }
        .home-card:active { transform: scale(0.97); }
        
        #menu {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 10px;
            padding: 12px;
            height: calc(100vh - 110px);
            box-sizing: border-box;
        }

        .stage-card { 
            transition: all 0.2s ease-in-out; 
            cursor: pointer; 
            background-color: #065f46; 
            border: 2px solid rgba(5, 150, 105, 0.4); 
            border-radius: 1.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 6px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15);
            color: white;
            text-align: center;
        }

        .stage-card:active { 
            transform: scale(0.92); 
            background-color: var(--accent-emerald);
            border-color: var(--soft-emerald);
        }

        .stage-card span:nth-child(1) { font-size: 1.75rem; margin-bottom: 4px; }
        .stage-card span:nth-child(2) { font-weight: 800; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
        .stage-card .sub-label { color: var(--soft-emerald); font-weight: 600; font-size: 9px; text-transform: lowercase; margin-top: 3px; opacity: 0.7; }
        
        .btn-primary { 
            background: linear-gradient(135deg, #059669 0%, #064e3b 100%); 
            color: white; 
            padding: 1.1rem; 
            border-radius: 1.5rem; 
            font-weight: 900; 
            width: 100%; 
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); 
            border: 1px solid rgba(255,255,255,0.1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-next-step { 
            background: rgba(5, 150, 105, 0.15); 
            color: var(--soft-emerald); 
            padding: 0.6rem 1.5rem; 
            border-radius: 1.25rem; 
            font-weight: 800; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 0.15em; 
            border: 1px solid rgba(5, 150, 105, 0.4);
            margin-top: 1.5rem;
            transition: 0.3s;
        }

        .blur-text { filter: blur(10px); transition: filter 0.4s ease; cursor: pointer; }
        .blur-text.revealed { filter: blur(0); }
        
        .star-box { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 38px; height: 38px; }
        .star-icon { font-size: 32px; transition: color 0.3s ease; }
        .star-text { 
            position: absolute; 
            top: 55%; left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 11px; 
            font-weight: 900; 
            color: var(--primary-dark); 
            pointer-events: none;
        }

        .match-item { 
            border: 2px solid #065f46; 
            border-radius: 18px; 
            padding: 10px; 
            text-align: center; 
            cursor: pointer; 
            min-height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            background: #064e3b; 
            transition: 0.25s; 
            color: white; 
            font-size: 14px; 
            box-shadow: 0 4px 0 #043a2c;
        }
        .match-selected { border-color: #10b981; background-color: #065f46; transform: translateY(-2px); box-shadow: 0 6px 0 #043a2c; }
        .match-correct { border-color: #22c55e; background-color: #14532d; color: #4ade80; box-shadow: none; transform: none; opacity: 0.6; }
        .match-wrong { border-color: #ef4444; background-color: #450a0a; animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }

        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

        .choice-btn { 
            transition: all 0.2s; 
            border: 2px solid #065f46; 
            background: #065f46; 
            color: white; 
            font-size: 15px; 
            font-weight: 700;
            border-radius: 1.25rem;
        }
        .choice-correct { background-color: #14532d !important; border-color: #22c55e !important; box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .choice-wrong { background-color: #450a0a !important; border-color: #ef4444 !important; }

        input { 
            background: #064e3b !important; 
            color: white !important; 
            border-color: #059669 !important; 
            caret-color: #10b981;
        }

        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--accent-emerald); border-radius: 10px; }

        /* Stats Styles */
        #stats-view { height: 100vh; width: 100%; position: fixed; inset: 0; background-color: var(--primary-dark); z-index: 60; display: flex; flex-direction: column; }
        .bar-container { display: flex; align-items: flex-end; justify-content: space-between; height: 85px; gap: 6px; padding-top: 15px; }
        .bar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .bar-fill { width: 100%; background: #10b981; border-radius: 6px 6px 0 0; min-height: 4px; transition: height 0.7s cubic-bezier(0.4, 0, 0.2, 1); position: relative; }
        .bar-fill.time-bar { background: #3b82f6; }
        .bar-fill::after { content: attr(data-val); position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 9px; font-weight: 900; color: white; white-space: nowrap; }
        .bar-label { font-size: 8px; font-weight: 800; text-transform: uppercase; color: #6ee7b7; margin-top: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div id="welcome-screen" class="flex-grow flex flex-col p-6 max-w-lg mx-auto w-full">
        <div class="mt-20 mb-10 text-center">
            <h1 class="text-6xl font-black text-emerald-400 tracking-tighter mb-1 italic drop-shadow-lg">Usanim</h1>
            <p class="text-emerald-500 font-black tracking-[0.4em] uppercase text-[10px] opacity-80">Premium Language Lab</p>
        </div>
        <div class="space-y-5">
            <div onclick="goToAppMenu()" class="home-card glass p-7 rounded-[2.5rem] shadow-2xl flex items-center justify-between relative overflow-hidden">
                <div class="flex items-center gap-5 z-10">
                    <div class="w-16 h-16 bg-emerald-900/60 rounded-2xl flex items-center justify-center text-3xl border border-emerald-700/50 shadow-inner">🇬🇧</div>
                    <div>
                        <h2 class="text-2xl font-black text-white leading-tight">A1 Մակարդակ</h2>
                        <div class="flex items-center gap-3 mt-1.5">
                            <p id="home-word-count" class="text-emerald-300 text-[11px] font-bold uppercase tracking-wider">...</p>
                            <span class="text-emerald-800 font-black">/</span>
                            <p id="home-progress-pct" class="text-emerald-400 text-[11px] font-black bg-emerald-900/50 px-2 py-0.5 rounded-md">0%</p>
                        </div>
                    </div>
                </div>
                <div class="z-10 w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-lg">➔</div>
                <div id="home-bg-progress" class="absolute left-0 bottom-0 h-1.5 bg-emerald-400 transition-all duration-1000 shadow-[0_0_10px_#34d399]" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden h-screen flex flex-col overflow-hidden">
        <div class="bg-emerald-950 p-4 text-white sticky top-0 z-50 shadow-2xl w-full border-b border-emerald-800 shrink-0">
            <div class="max-w-4xl mx-auto flex justify-between items-center mb-3">
                <div onclick="goToWelcome()" class="cursor-pointer flex items-center gap-3 active:scale-95 transition-transform">
                    <span class="text-xl">🏠</span>
                    <h1 class="font-black text-lg leading-none italic uppercase tracking-tighter text-emerald-100">Usanim Pro</h1>
                </div>
                <div class="flex items-center gap-3">
                    <div id="session-timer-display" class="text-[10px] font-black bg-black/40 px-3 py-1.5 rounded-xl border border-emerald-700/50 text-emerald-400">00:00</div>
                    <button onclick="showDeleteModal()" class="text-[9px] bg-rose-950/30 hover:bg-rose-900/50 text-rose-400 px-3 py-1.5 rounded-full font-black uppercase tracking-widest border border-rose-900/30 transition-all">Reset</button>
                </div>
            </div>
            <div class="max-w-4xl mx-auto w-full bg-black/40 rounded-full h-1.5 overflow-hidden border border-white/5">
                <div id="progress-bar" class="bg-gradient-to-r from-emerald-600 to-emerald-300 h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>

        <div id="menu" class="max-w-4xl mx-auto flex-grow w-full">
            <button onclick="openStage(1)" class="stage-card"><span>🗂️</span><span>Փուլ 1</span><span class="sub-label">ծանոթացում</span></button>
            <button onclick="openStage(2)" class="stage-card"><span>🔘</span><span>Փուլ 2</span><span class="sub-label">ընտրություն</span></button>
            <button onclick="openStage(3)" class="stage-card"><span>🧩</span><span>Փուլ 3</span><span class="sub-label">զույգեր</span></button>
            <button onclick="openStage(4)" class="stage-card"><span>⌨️</span><span>Փուլ 4</span><span class="sub-label">թարգմանություն</span></button>
            <button onclick="openStage(5)" class="stage-card"><span>🔄</span><span>Փուլ 5</span><span class="sub-label">հակառակը</span></button>
            <button onclick="openStage(6)" class="stage-card"><span>🎧</span><span>Փուլ 6</span><span class="sub-label">լսողություն</span></button>
            <button onclick="openSmartMenu()" class="stage-card !bg-emerald-900/80 border-emerald-500/50"><span>🎓</span><span>Փուլ 7</span><span class="sub-label">Smart կրկնություն</span></button>
            <button onclick="openExam()" class="stage-card"><span>📝</span><span>Փուլ 8</span><span class="sub-label">քննություն</span></button>
            <button onclick="openStatsStage()" class="stage-card"><span>📊</span><span>Փուլ 9</span><span class="sub-label">ստատիստիկա</span></button>
        </div>
    </div>

    <div id="view" class="hidden flex-grow flex flex-col p-4 max-w-2xl mx-auto w-full">
        <div class="flex justify-between items-center mb-6 pt-2">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-[10px] uppercase tracking-widest bg-emerald-900/80 px-4 py-2 rounded-full border border-emerald-700 shadow-lg active:scale-90 transition-transform">⬅ ԵԼՔ</button>
            <div id="view-title" class="text-[10px] font-black text-emerald-200 uppercase tracking-[0.3em] text-center px-4 bg-emerald-950/50 py-1.5 rounded-lg border border-white/5"></div>
            <div class="w-10"></div>
        </div>
        <div id="content" class="flex-grow flex flex-col items-center justify-center w-full"></div>
    </div>

    <div id="smart-menu-view" class="hidden flex-grow p-8 max-w-2xl mx-auto space-y-8 text-center w-full">
         <div class="flex justify-start mb-4">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-[10px] uppercase tracking-widest bg-emerald-900/80 px-4 py-2 rounded-full border border-emerald-700">⬅ ԵԼՔ</button>
        </div>
        <div class="mb-4">
            <h2 class="text-3xl font-black text-white italic uppercase tracking-tighter">Smart Ուսուցում</h2>
            <p class="text-emerald-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-2">Անհատականացված մոտեցում</p>
        </div>
        <div class="grid grid-cols-1 gap-5 pt-4">
            <button onclick="openSmartStage('difficult')" class="btn-primary flex items-center justify-between px-8 py-8">
                <div class="flex flex-col items-start">
                    <span class="text-lg">🔥 Դժվար բառեր</span>
                    <span class="text-[9px] opacity-60 normal-case mt-1">Հաճախակի սխալվող բառեր</span>
                </div>
                <span id="diff-count" class="bg-black/30 px-4 py-1.5 rounded-full text-sm font-black border border-white/10">0</span>
            </button>
            <button onclick="openSmartStage('repetition')" class="btn-primary flex items-center justify-between px-8 py-8 !bg-emerald-950 border border-emerald-800">
                <div class="flex flex-col items-start">
                    <span class="text-lg">⏳ Կրկնություն</span>
                    <span class="text-[9px] opacity-60 normal-case mt-1">Spaced Repetition տրամաբանություն</span>
                </div>
                <span id="rep-count" class="bg-emerald-500/20 px-4 py-1.5 rounded-full text-sm font-black border border-emerald-500/30 text-emerald-300">0</span>
            </button>
        </div>
    </div>

    <div id="stats-view" class="hidden">
        <div class="p-4 bg-emerald-950/90 sticky top-0 z-10 flex justify-between items-center border-b border-emerald-800 backdrop-blur-xl">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-[9px] uppercase tracking-widest bg-emerald-900/50 px-4 py-2 rounded-full border border-emerald-700">⬅ ԵԼՔ</button>
            <h1 class="font-black text-xs italic uppercase tracking-[0.25em] text-emerald-100">Վիճակագրություն</h1>
            <div class="w-10"></div>
        </div>
        <div id="stats-container" class="flex-grow overflow-y-auto p-4 space-y-6 custom-scroll"></div>
    </div>

    <div id="delete-modal" class="hidden fixed inset-0 bg-black/95 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-emerald-950 p-10 rounded-[3rem] w-full max-w-sm text-center shadow-2xl border border-emerald-800/50">
            <div class="text-5xl mb-6">⚠️</div>
            <h2 class="text-xl font-black text-white mb-3 uppercase tracking-tight">Ջնջել ամբողջը?</h2>
            <p class="text-emerald-400 text-[10px] font-bold mb-8 uppercase tracking-widest leading-relaxed">Հաստատելու համար գրեք <span class="text-white bg-rose-900/50 px-2 py-0.5 rounded">DELETE</span> բառը</p>
            <input type="text" id="delete-confirm-input" class="w-full p-5 border-2 border-emerald-800 rounded-2xl text-center mb-8 uppercase outline-none focus:border-emerald-500 transition-all font-black text-lg">
            <div class="flex gap-4">
                <button onclick="hideDeleteModal()" class="flex-1 p-5 bg-emerald-900 text-emerald-100 rounded-2xl font-black uppercase text-xs tracking-widest">Ոչ</button>
                <button id="real-delete-btn" onclick="confirmFinalDelete()" disabled class="flex-1 p-5 bg-emerald-800 text-emerald-700 rounded-2xl font-black uppercase text-xs tracking-widest transition-all">Այո</button>
            </div>
        </div>
    </div>

    <script>
        let words = [], activeStage = 1, activeIndex = 0, activeList = [], canProceed = false;
        let examScores = [], dailyWordsCount = 0, dailyGoal = 20;
        let selectedEn = null, selectedHy = null, smartMode = null; 
        let sessionMinutes = 0, sessionSeconds = 0, reminderMinute = 15; 
        let dailyTimeData = {}, touchStartX = 0, touchEndX = 0;

        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, false);
        document.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, false);

        function handleSwipe() {
            const threshold = 80;
            if (touchStartX - touchEndX > threshold) triggerNextAction();
        }

        function triggerNextAction() {
            const btns = ['next-btn', 'next-batch-btn', 'ex-btn', 'check-btn'];
            for(let id of btns) {
                const btn = document.getElementById(id);
                if (btn && !btn.classList.contains('hidden')) { btn.click(); break; }
            }
        }

        async function initApp() {
            try {
                const response = await fetch('./vocabulary.json');
                const data = await response.json();
                words = data.map((item, index) => ({
                    id: item.id || index, en: item.word, hy: item.translation,
                    score: 0, stagesCompleted: [], isInstant: false, isSeen: false,
                    errorCount: 0, learnedDate: null, repLevel: 0, nextRepDate: null
                }));
                loadProgress(); 
                updateStats();
                startTimer();
                document.getElementById('home-word-count').innerText = `${words.length} բառ`;
                
                document.getElementById('delete-confirm-input').addEventListener('input', (e) => {
                    const btn = document.getElementById('real-delete-btn');
                    const isMatch = e.target.value.toUpperCase() === 'DELETE';
                    btn.disabled = !isMatch;
                    btn.className = isMatch ? 'flex-1 p-5 bg-rose-600 text-white rounded-2xl font-black uppercase text-xs tracking-widest' : 'flex-1 p-5 bg-emerald-800 text-emerald-700 rounded-2xl font-black uppercase text-xs tracking-widest';
                });
            } catch (e) { console.error("Usanim Error:", e); }
        }

        function startTimer() {
            setInterval(() => {
                sessionSeconds++;
                if(sessionSeconds >= 60) {
                    sessionSeconds = 0; sessionMinutes++;
                    const today = new Date().toISOString().split('T')[0];
                    dailyTimeData[today] = (dailyTimeData[today] || 0) + 1;
                    if(sessionMinutes === reminderMinute) {
                        alert(`Ժամանակն է կարճ դադար տալ: Դուք արդեն սովորում եք ${sessionMinutes} րոպե:`);
                    }
                    saveProgress();
                }
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = String(sessionMinutes).padStart(2, '0');
            const s = String(sessionSeconds).padStart(2, '0');
            const display = document.getElementById('session-timer-display');
            if(display) display.innerText = `${m}:${s}`;
        }

        function loadProgress() {
            const saved = localStorage.getItem('usanim_pro_v4');
            if(saved) {
                const p = JSON.parse(saved);
                words.forEach(w => { if(p.words && p.words[w.id]) Object.assign(w, p.words[w.id]); });
                examScores = p.examScores || [];
                dailyWordsCount = p.dailyWordsCount || 0;
                dailyGoal = p.dailyGoal || 20;
                dailyTimeData = p.dailyTimeData || {};
                reminderMinute = p.reminderMinute || 15;
            }
        }

        function saveProgress() {
            const storage = { words: {}, examScores, dailyWordsCount, dailyGoal, dailyTimeData, reminderMinute };
            words.forEach(w => {
                storage.words[w.id] = { 
                    score: w.score, stagesCompleted: w.stagesCompleted, isInstant: w.isInstant, 
                    isSeen: w.isSeen, errorCount: w.errorCount, learnedDate: w.learnedDate,
                    repLevel: w.repLevel, nextRepDate: w.nextRepDate
                };
            });
            localStorage.setItem('usanim_pro_v4', JSON.stringify(storage));
        }

        function isWordLearned(w) {
            if (w.isInstant) return true;
            return [2, 3, 4, 5, 6].every(s => w.stagesCompleted.includes(s));
        }

        function setNextRep(word) {
            const intervals = [1, 3, 7, 14, 30, 90, 180];
            const days = intervals[word.repLevel] || 180;
            let date = new Date();
            date.setDate(date.getDate() + days);
            word.nextRepDate = date.toISOString().split('T')[0];
            word.repLevel = Math.min(word.repLevel + 1, intervals.length - 1);
        }

        function updateStats() {
            const learned = words.filter(w => isWordLearned(w)).length;
            const pct = Math.round((learned / words.length) * 100);
            document.getElementById('home-progress-pct').innerText = pct + "%";
            document.getElementById('home-bg-progress').style.width = pct + "%";
            document.getElementById('progress-bar').style.width = pct + "%";
            
            const diffWords = words.filter(w => w.errorCount >= 5 && !isWordLearned(w));
            const today = new Date().toISOString().split('T')[0];
            const repWords = words.filter(w => isWordLearned(w) && w.nextRepDate && w.nextRepDate <= today);
            
            if(document.getElementById('diff-count')) document.getElementById('diff-count').innerText = diffWords.length;
            if(document.getElementById('rep-count')) document.getElementById('rep-count').innerText = repWords.length;
        }

        function getStars(word) {
            const stages = [2, 3, 4, 5, 6];
            let html = '<div class="flex flex-col items-center mb-3"><div class="flex justify-center gap-1.5 mb-1">';
            stages.forEach(s => {
                const isCompleted = word.stagesCompleted.includes(s);
                const isActive = (activeStage === s);
                let colorClass = isCompleted ? 'text-yellow-400' : 'text-emerald-900';
                if (isActive && !isCompleted) colorClass = 'text-emerald-500 animate-pulse';
                html += `<div class="star-box"><span class="star-icon ${colorClass}">★</span>${isActive && !isCompleted ? `<span class="star-text !text-white">${word.score}</span>` : ''}${isCompleted ? `<span class="star-text">✓</span>` : ''}</div>`;
            });
            return html + '</div></div>';
        }

        function cleanText(text) { return text.trim().toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,""); }
        function goToAppMenu() { document.getElementById('welcome-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); updateStats(); }
        function goToWelcome() { document.getElementById('app-content').classList.add('hidden'); document.getElementById('welcome-screen').classList.remove('hidden'); updateStats(); }

        function openSmartMenu() {
            updateStats();
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('smart-menu-view').classList.remove('hidden');
        }

        function openSmartStage(mode) {
            smartMode = mode; activeStage = 7; activeIndex = 0;
            document.getElementById('smart-menu-view').classList.add('hidden');
            document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = mode === 'difficult' ? '🔥 ԴԺՎԱՐ ԲԱՌԵՐ' : '⏳ ԿՐԿՆՈՒԹՅՈՒՆ';
            initStageLogic();
        }

        function openStage(num) {
            activeStage = num; activeIndex = 0; smartMode = null;
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = `ՓՈՒԼ ${num}`;
            initStageLogic();
        }

        function initStageLogic() {
            const container = document.getElementById('content');
            container.innerHTML = "";
            
            if (activeStage === 7) {
                if(smartMode === 'difficult') activeList = words.filter(w => w.errorCount >= 5 && !isWordLearned(w)).slice(0, 10);
                else { const today = new Date().toISOString().split('T')[0]; activeList = words.filter(w => isWordLearned(w) && w.nextRepDate && w.nextRepDate <= today).slice(0, 10); }
            } else if (activeStage === 1) {
                activeList = words.filter(w => !isWordLearned(w) && !w.stagesCompleted.includes(1)).slice(0, 10);
            } else {
                activeList = words.filter(w => !isWordLearned(w) && !w.stagesCompleted.includes(activeStage)).slice(0, 10);
            }

            if (activeList.length === 0) return renderFinish();
            if (activeStage === 1) renderStage1();
            else if (activeStage === 3) renderStage3();
            else renderGenericStage();
        }

        function renderStage1() {
            const word = activeList[activeIndex];
            if (!word) return renderFinish();
            document.getElementById('content').innerHTML = `
                <div class="w-full bg-emerald-900/60 rounded-[3rem] p-8 text-center shadow-2xl mb-8 border-b-8 border-emerald-500/50 min-h-[220px] flex flex-col justify-center glass">
                    <h2 class="text-4xl font-black text-white mb-5 italic" onclick="speak('${word.en}')">${word.en}</h2>
                    <h3 onclick="this.classList.toggle('revealed')" class="text-2xl font-bold text-emerald-400 blur-text italic">${word.hy}</h3>
                </div>
                <div class="grid grid-cols-2 gap-5 w-full">
                    <button onclick="handleStage1(true)" class="btn-primary">ԳԻՏԵՄ</button>
                    <button onclick="handleStage1(false)" class="btn-primary !bg-emerald-950 border-emerald-800">ՉԳԻՏԵՄ</button>
                </div>
                <div class="flex justify-center w-full"><button id="next-btn" onclick="skipStage1()" class="btn-next-step">ԲԱՑ ԹՈՂՆԵԼ</button></div>`;
            speak(word.en);
        }

        function handleStage1(known) {
            const w = activeList[activeIndex];
            w.isSeen = true;
            if (!w.stagesCompleted.includes(1)) w.stagesCompleted.push(1);
            if(known) { 
                w.isInstant = true; 
                w.learnedDate = new Date().toISOString().split('T')[0]; 
                setNextRep(w); dailyWordsCount++; 
            } 
            saveProgress(); activeIndex++; 
            if (activeIndex >= activeList.length) renderFinish(); else renderStage1();
        }

        function skipStage1() { activeIndex++; if (activeIndex >= activeList.length) renderFinish(); else renderStage1(); }

        function renderStage3() {
            const batch = activeList.slice(0, 5);
            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-2 gap-4 w-full items-start overflow-y-auto max-h-[65vh] pr-1 custom-scroll">
                    <div class="space-y-4" id="en-list"></div><div class="space-y-4" id="hy-list"></div>
                </div>
                <div class="flex justify-center w-full"><button id="next-batch-btn" onclick="initStageLogic()" class="btn-next-step">ՀԱՋՈՐԴ ԽՈՒՄԲ</button></div>`;
            const leftSide = [...batch].sort(() => Math.random() - 0.5);
            const rightSide = [...batch].sort(() => Math.random() - 0.5);
            leftSide.forEach(w => {
                const el = document.createElement('div'); el.className = 'match-item'; el.innerHTML = `<span class="break-words px-2">${w.en}</span>`;
                el.onclick = () => selectMatch(el, 'en', w); document.getElementById('en-list').appendChild(el);
            });
            rightSide.forEach(w => {
                const el = document.createElement('div'); el.className = 'match-item'; el.innerHTML = `<span class="break-words px-2">${w.hy}</span>`;
                el.onclick = () => selectMatch(el, 'hy', w); document.getElementById('hy-list').appendChild(el);
            });
        }

        function selectMatch(el, type, word) {
            if(el.classList.contains('match-correct')) return;
            document.querySelectorAll(`.match-item`).forEach(i => i.classList.remove('match-selected'));
            el.classList.add('match-selected');
            if(type === 'en') { selectedEn = { el, word }; speak(word.en); }
            else selectedHy = { el, word };
            
            if(selectedEn && selectedHy) {
                if(selectedEn.word.id === selectedHy.word.id) {
                    selectedEn.el.className = 'match-item match-correct'; 
                    selectedHy.el.className = 'match-item match-correct';
                    selectedEn.word.score = Math.min(10, selectedEn.word.score + 1);
                    if(selectedEn.word.score >= 10) { 
                        selectedEn.word.score = 0; selectedEn.word.stagesCompleted.push(3); 
                        if(isWordLearned(selectedEn.word)) { 
                            selectedEn.word.learnedDate = new Date().toISOString().split('T')[0]; 
                            setNextRep(selectedEn.word); dailyWordsCount++; 
                        }
                    }
                } else {
                    selectedEn.el.classList.add('match-wrong'); selectedHy.el.classList.add('match-wrong');
                    selectedEn.word.score = Math.max(0, selectedEn.word.score - 1); 
                    selectedEn.word.errorCount++; 
                    setTimeout(() => { document.querySelectorAll('.match-wrong').forEach(i => i.classList.remove('match-wrong', 'match-selected')); }, 500);
                }
                saveProgress(); selectedEn = null; selectedHy = null;
            }
        }

        function renderGenericStage() {
            const word = activeList[activeIndex % activeList.length];
            if (activeStage === 2) return renderMultipleChoice(word);

            let question = word.en, answer = word.hy;
            if(activeStage === 4) { question = word.hy; answer = word.en; }
            else if(activeStage === 5) { question = word.en; answer = word.hy; }
            else if(activeStage === 6) { question = "🔊"; answer = word.en; }
            else if(activeStage === 7) { question = word.en; answer = word.hy; }
            
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center flex flex-col items-center">
                    <div class="mb-2">${getStars(word)}</div>
                    <div class="mb-8 text-4xl font-black text-white italic drop-shadow-md" onclick="speak('${word.en}')">${question}</div>
                    <input type="text" id="stage-input" autofocus class="w-full p-6 border-4 border-emerald-900/50 rounded-[2.5rem] text-center text-2xl outline-none glass" placeholder="..." autocomplete="off">
                    <button id="check-btn" onclick="checkGeneric('${answer}')" class="btn-primary mt-8">ՍՏՈՒԳԵԼ</button>
                    <button id="next-btn" onclick="skipGeneric()" class="btn-next-step">ՀԱՋՈՐԴԸ</button>
                </div>`;
            if(activeStage !== 4) speak(word.en);
            setTimeout(() => document.getElementById('stage-input')?.focus(), 150);
        }

        function checkGeneric(correct) {
            const input = document.getElementById('stage-input');
            const word = activeList[activeIndex % activeList.length];
            if(cleanText(input.value) === cleanText(correct)) {
                if(activeStage === 4) speak(word.en);
                word.score = Math.min(10, word.score + 1);
                input.className = "w-full p-6 border-4 border-emerald-500 bg-emerald-600/50 text-white rounded-[2.5rem] text-center text-2xl outline-none glass";
                if(word.score >= 10) {
                    if(activeStage !== 7) {
                        word.score = 0; word.stagesCompleted.push(activeStage);
                        if(isWordLearned(word)) { word.learnedDate = new Date().toISOString().split('T')[0]; setNextRep(word); dailyWordsCount++; }
                    } else if (smartMode === 'repetition') setNextRep(word);
                    setTimeout(() => { activeIndex++; initStageLogic(); }, 700);
                } else {
                    setTimeout(() => { activeIndex++; initStageLogic(); }, 500);
                }
            } else {
                word.score = Math.max(0, word.score - 1); word.errorCount++;
                input.className = "w-full p-6 border-4 border-rose-600 bg-rose-900/50 text-white rounded-[2.5rem] text-center text-2xl outline-none glass animate-shake";
                input.value = correct;
                document.getElementById('check-btn').classList.add('hidden');
                setTimeout(() => initStageLogic(), 1500);
            }
            saveProgress();
        }

        function renderMultipleChoice(word) {
            let options = [word.hy];
            let pool = words.filter(w => w.id !== word.id).sort(() => 0.5 - Math.random());
            options.push(...pool.slice(0, 3).map(w => w.hy));
            options.sort(() => 0.5 - Math.random());
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center flex flex-col items-center">
                    <div class="mb-2">${getStars(word)}</div>
                    <div class="mb-8 text-4xl font-black text-white italic" onclick="speak('${word.en}')">${word.en}</div>
                    <div class="grid grid-cols-1 gap-3 w-full max-h-[50vh] overflow-y-auto pr-1 custom-scroll">
                        ${options.map(opt => `<button onclick="checkChoice(this, '${opt}', '${word.hy}')" class="choice-btn p-5 border-2 border-emerald-900 rounded-[1.5rem] shadow-lg active:scale-95">${opt}</button>`).join('')}
                    </div>
                    <button id="next-btn" onclick="skipGeneric()" class="btn-next-step">ԲԱՑ ԹՈՂՆԵԼ</button>
                </div>`;
            speak(word.en);
        }

        function checkChoice(btn, selected, correct) {
            const word = activeList[activeIndex % activeList.length];
            if(cleanText(selected) === cleanText(correct)) {
                btn.classList.add('choice-correct'); word.score = Math.min(10, word.score + 1);
                if(word.score >= 10 && activeStage !== 7) { 
                    word.score = 0; word.stagesCompleted.push(2); 
                    if(isWordLearned(word)) { word.learnedDate = new Date().toISOString().split('T')[0]; setNextRep(word); dailyWordsCount++; } 
                }
                setTimeout(() => { activeIndex++; initStageLogic(); }, 600);
            } else { 
                btn.classList.add('choice-wrong'); word.score = Math.max(0, word.score - 1); word.errorCount++; 
                setTimeout(() => initStageLogic(), 1200);
            }
            saveProgress(); 
        }

        function skipGeneric() { activeIndex++; initStageLogic(); }

        function getWeeklyData() {
            const last7Days = [], learnedCounts = [], timeCounts = [], today = new Date();
            for (let i = 6; i >= 0; i--) {
                const d = new Date(); d.setDate(today.getDate() - i);
                const dateStr = d.toISOString().split('T')[0];
                const dayName = d.toLocaleDateString('hy-AM', { weekday: 'short' });
                learnedCounts.push(words.filter(w => w.learnedDate === dateStr).length);
                timeCounts.push(dailyTimeData[dateStr] || 0);
                last7Days.push(dayName);
            }
            return { labels: last7Days, wordData: learnedCounts, timeData: timeCounts };
        }

        function openStatsStage() {
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('stats-view').classList.remove('hidden');
            const container = document.getElementById('stats-container');
            const learnedWords = words.filter(w => isWordLearned(w));
            const weekly = getWeeklyData();
            const maxWordVal = Math.max(...weekly.wordData, 10);
            const maxTimeVal = Math.max(...weekly.timeData, 30); 
            const goalProgress = Math.min(100, Math.round((dailyWordsCount / dailyGoal) * 100));

            container.innerHTML = `
                <div class="bg-emerald-900/40 p-6 rounded-[2.5rem] shadow-2xl border border-emerald-800 text-center glass">
                    <p class="text-[9px] font-black uppercase mb-2 tracking-widest opacity-60">Ընդհանուր առաջընթաց</p>
                    <div class="flex items-center justify-center gap-5">
                        <span class="text-5xl font-black italic text-white drop-shadow-lg">${learnedWords.length}</span>
                        <div class="text-left"><p class="text-emerald-400 font-black text-2xl leading-none">${Math.round((learnedWords.length / words.length) * 100)}%</p><p class="text-[8px] font-bold uppercase opacity-50 tracking-tighter">սովորած բառեր</p></div>
                    </div>
                </div>
                <div class="grid grid-cols-1 gap-5">
                    <div class="bg-emerald-950/50 p-5 rounded-[2rem] border border-emerald-800/50">
                        <h3 class="font-black text-[9px] mb-4 uppercase text-center italic tracking-widest text-emerald-400">Շաբաթվա բառեր</h3>
                        <div class="bar-container">${weekly.wordData.map((val, i) => `<div class="bar-wrapper"><div class="bar-fill" data-val="${val}" style="height: ${(val/maxWordVal)*100}%"></div><span class="bar-label">${weekly.labels[i]}</span></div>`).join('')}</div>
                    </div>
                    <div class="bg-emerald-950/50 p-5 rounded-[2rem] border border-emerald-800/50">
                        <h3 class="font-black text-[9px] mb-4 uppercase text-center italic tracking-widest text-blue-400">Օգտագործված ժամանակ (ր)</h3>
                        <div class="bar-container">${weekly.timeData.map((val, i) => `<div class="bar-wrapper"><div class="bar-fill time-bar" data-val="${val}ր" style="height: ${(val/maxTimeVal)*100}%"></div><span class="bar-label">${weekly.labels[i]}</span></div>`).join('')}</div>
                    </div>
                </div>
                <div class="bg-emerald-900/60 p-6 rounded-[2.5rem] border border-emerald-800 glass">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="text-center">
                            <h2 class="text-[9px] font-black mb-3 uppercase italic text-emerald-300 tracking-wider">Օրվա նպատակ</h2>
                            <div class="flex items-center justify-center gap-3">
                                <div class="relative w-12 h-12">
                                    <svg class="w-full h-full" viewBox="0 0 36 36">
                                        <path class="text-emerald-950" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                        <path class="text-emerald-400" stroke-dasharray="${goalProgress}, 100" stroke-width="3" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                                    </svg>
                                    <div class="absolute inset-0 flex flex-col items-center justify-center"><span class="text-[11px] font-black">${dailyWordsCount}</span></div>
                                </div>
                                <input type="number" value="${dailyGoal}" onchange="updateDailyGoal(this.value)" class="w-12 p-2 rounded-xl text-center font-black bg-black/30 border border-emerald-700 text-xs">
                            </div>
                        </div>
                        <div class="text-center">
                            <h2 class="text-[9px] font-black mb-3 uppercase italic text-blue-300 tracking-wider">Հիշեցում (ր)</h2>
                            <input type="number" value="${reminderMinute}" onchange="updateReminder(this.value)" class="w-14 p-2 rounded-xl text-center font-black bg-black/30 border border-emerald-700 text-xs">
                        </div>
                    </div>
                </div>
            `;
        }

        function updateDailyGoal(val) { dailyGoal = Math.max(1, parseInt(val) || 20); saveProgress(); openStatsStage(); }
        function updateReminder(val) { reminderMinute = Math.max(1, parseInt(val) || 15); saveProgress(); }

        function openExam() {
            activeList = [...words].sort(() => 0.5 - Math.random()).slice(0, 30);
            activeIndex = 0; smartMode = null; activeStage = 8;
            document.getElementById('app-content').classList.add('hidden'); document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = "ՔՆՆՈՒԹՅՈՒՆ";
            renderExamStep(0);
        }

        function renderExamStep(correctCount) {
            if(activeIndex >= activeList.length) return renderFinish(`Արդյունքը: ${Math.round((correctCount/activeList.length)*100)}%`);
            const word = activeList[activeIndex];
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center flex flex-col items-center">
                    <p class="text-[11px] font-black text-emerald-500 mb-6 uppercase bg-emerald-950 px-4 py-1 rounded-full">${activeIndex+1} / ${activeList.length}</p>
                    <h2 class="text-4xl font-black text-white mb-10 italic">${word.en}</h2>
                    <input type="text" id="exam-in" autofocus class="w-full p-6 border-4 border-emerald-900 rounded-[2.5rem] text-center text-xl outline-none glass" placeholder="..." autocomplete="off">
                    <button id="ex-btn" class="btn-primary mt-8">ՀԱՋՈՐԴԸ</button>
                </div>`;
            setTimeout(() => document.getElementById('exam-in').focus(), 150);
            document.getElementById('ex-btn').onclick = () => { 
                if(cleanText(document.getElementById('exam-in').value) === cleanText(word.hy)) correctCount++; 
                else word.errorCount++; 
                activeIndex++; renderExamStep(correctCount); 
            };
        }

        function renderFinish(extra = "") {
            document.getElementById('content').innerHTML = `
                <div class="text-center p-10 bg-emerald-900 rounded-[3.5rem] shadow-2xl w-full border-b-8 border-emerald-500 glass">
                    <div class="text-7xl mb-6 animate-bounce">🏆</div>
                    <h2 class="text-3xl font-black mb-3 text-white italic">Հրաշալի է</h2>
                    <p class="text-emerald-200 mb-8 font-bold">${extra || "Դուք հաջողությամբ ավարտեցիք այս փուլը:"}</p>
                    <button onclick="exitToMenu()" class="btn-primary">ՎԵՐԱԴԱՌՆԱԼ ՄԵՆՅՈՒ</button>
                </div>`;
            saveProgress();
        }

        function exitToMenu() {
            document.querySelectorAll('#view, #stats-view, #smart-menu-view').forEach(el => el.classList.add('hidden'));
            document.getElementById('app-content').classList.remove('hidden');
            window.speechSynthesis.cancel(); updateStats();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const cleanWord = text.trim();
            const msg = new SpeechSynthesisUtterance(cleanWord.toLowerCase() === "i" ? "eye" : cleanWord);
            msg.lang = 'en-US'; msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function showDeleteModal() { document.getElementById('delete-modal').classList.remove('hidden'); }
        function hideDeleteModal() { document.getElementById('delete-modal').classList.add('hidden'); }
        function confirmFinalDelete() { localStorage.removeItem('usanim_pro_v4'); location.reload(); }

        initApp();
    </script>
</body>
</html>
