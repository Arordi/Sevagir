<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usanim Pro - A1 Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0fdf4; user-select: none; touch-action: manipulation; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .stage-card { transition: 0.2s; cursor: pointer; background: #a7f3d0; border: 2px solid #6ee7b7; border-radius: 2rem; padding: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); width: 100%; display: flex; flex-direction: column; align-items: center; }
        .stage-card:active { transform: scale(0.95); background: #6ee7b7; }
        .stage-card span:last-child { color: #064e3b; font-weight: 800; font-size: 11px; text-transform: uppercase; margin-top: 8px; letter-spacing: 0.1em; }
        .btn-primary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; padding: 1.25rem; border-radius: 1.25rem; font-weight: bold; width: 100%; box-shadow: 0 10px 15px -3px rgba(16,185,129,0.3); }
        .blur-text { filter: blur(8px); transition: 0.3s; cursor: pointer; }
        .blur-text.revealed { filter: blur(0); }
        .match-item { border: 2px solid #d1fae5; border-radius: 20px; padding: 12px; text-align: center; cursor: pointer; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 600; background: white; transition: 0.2s; }
        .match-selected { border-color: #10b981; background: #f0fdf4; }
        .match-correct { border-color: #22c55e; background: #dcfce7; color: #16a34a; pointer-events: none; }
        .match-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .dot { width: 7px; height: 7px; border-radius: 50%; background: #e2e8f0; display: inline-block; margin: 0 2px; }
        .dot-active { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="min-h-screen">

    <div id="welcome-screen" class="min-h-screen flex flex-col p-6 max-w-lg mx-auto">
        <div class="mt-20 mb-12 text-center">
            <h1 class="text-5xl font-black text-emerald-900 italic">Usanim</h1>
            <p class="text-emerald-600 font-bold tracking-[0.3em] uppercase text-xs">Premium Learning</p>
        </div>
        <div onclick="toggleView('welcome-screen', 'app-content')" class="glass p-8 rounded-[2.5rem] shadow-xl flex items-center justify-between relative overflow-hidden cursor-pointer border-l-[10px] border-emerald-500">
            <div class="flex items-center gap-5">
                <div class="w-16 h-16 bg-emerald-50 rounded-2xl flex items-center justify-center text-3xl shadow-inner">🇬🇧</div>
                <div>
                    <h2 class="text-2xl font-black text-slate-800">A1 Մակարդակ</h2>
                    <div class="flex items-center gap-2 mt-1">
                        <p id="h-count" class="text-slate-500 text-xs font-bold uppercase">...</p>
                        <p id="h-pct" class="text-emerald-600 text-xs font-black">0%</p>
                    </div>
                </div>
            </div>
            <div id="h-bg-line" class="absolute left-0 bottom-0 h-1.5 bg-emerald-400 transition-all duration-1000" style="width: 0%"></div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <div class="bg-emerald-600 p-4 text-white sticky top-0 z-50 shadow-lg">
            <div class="max-w-4xl mx-auto flex justify-between items-center mb-2">
                <div onclick="toggleView('app-content', 'welcome-screen')" class="cursor-pointer flex items-center gap-2">
                    <span class="text-xl">🏠</span><h1 class="font-bold italic uppercase tracking-tighter">Usanim A1</h1>
                </div>
                <button onclick="$('delete-modal').classList.remove('hidden')" class="text-[10px] bg-white/20 px-4 py-1.5 rounded-full font-black uppercase">Reset</button>
            </div>
            <div class="max-w-4xl mx-auto bg-black/10 rounded-full h-2 overflow-hidden"><div id="p-bar" class="bg-white h-full transition-all" style="width: 0%"></div></div>
        </div>
        <div id="menu" class="max-w-4xl mx-auto p-4 grid grid-cols-2 md:grid-cols-3 gap-4 py-8">
            <button onclick="openStage(1)" class="stage-card"><span>🗂️</span><span>Փուլ 1</span></button>
            <button onclick="openStage(2)" class="stage-card"><span>🔘</span><span>Փուլ 2</span></button>
            <button onclick="openStage(3)" class="stage-card"><span>🧩</span><span>Փուլ 3</span></button>
            <button onclick="openStage(4)" class="stage-card"><span>⌨️</span><span>Փուլ 4</span></button>
            <button onclick="openStage(5)" class="stage-card"><span>🔄</span><span>Փուլ 5</span></button>
            <button onclick="openStage(6)" class="stage-card"><span>🎧</span><span>Փուլ 6</span></button>
            <button onclick="openSmart()" class="stage-card"><span>🎓</span><span>Փուլ 7</span></button>
            <button onclick="openExam()" class="stage-card"><span>📝</span><span>Փուլ 8</span></button>
            <button onclick="openStats()" class="stage-card"><span>📊</span><span>Փուլ 9</span></button>
        </div>
    </div>

    <div id="view" class="hidden p-4 min-h-screen max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8 pt-4">
            <button onclick="exitToMenu()" class="font-black text-emerald-600 text-xs uppercase bg-emerald-100 px-4 py-2 rounded-full">⬅ ԵԼՔ</button>
            <div id="v-title" class="text-[10px] font-black text-emerald-800 uppercase tracking-[0.4em]"></div>
            <div class="w-12"></div>
        </div>
        <div id="content" class="flex flex-col items-center w-full"></div>
    </div>

    <div id="smart-menu" class="hidden max-w-2xl mx-auto p-6 space-y-6">
        <button onclick="exitToMenu()" class="font-black text-emerald-600 text-xs uppercase bg-emerald-100 px-4 py-2 rounded-full mb-4">⬅ ԵԼՔ</button>
        <div id="smart-cont" class="space-y-4"></div>
    </div>

    <div id="delete-modal" class="hidden fixed inset-0 bg-emerald-950/80 z-[100] flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
            <h2 class="text-xl font-black mb-4 uppercase text-rose-600">Ջնջել ամբողջը</h2>
            <input type="text" id="del-in" class="w-full p-4 border-2 border-emerald-100 rounded-2xl text-center mb-6 outline-none uppercase" placeholder="DELETE">
            <div class="flex gap-3">
                <button onclick="$('delete-modal').classList.add('hidden')" class="flex-1 p-4 bg-slate-100 rounded-2xl font-bold">ՈՉ</button>
                <button id="del-btn" onclick="confirmDelete()" disabled class="flex-1 p-4 bg-rose-600 text-white rounded-2xl font-bold">ԱՅՈ</button>
            </div>
        </div>
    </div>

    <script>
        let words = [], activeStage = 1, activeIndex = 0, activeList = [], examScores = [], dailyCount = 0, selEn = null, selHy = null;
        const $ = id => document.getElementById(id);
        const toggleView = (h, s) => { $(h).classList.add('hidden'); $(s).classList.remove('hidden'); updateStats(); };
        const speak = t => { window.speechSynthesis.cancel(); const m = new SpeechSynthesisUtterance(t); m.lang = 'en-US'; window.speechSynthesis.speak(m); };

        async function init() {
            try {
                const res = await fetch('./vocabulary.json');
                const data = await res.json();
                words = data.map((it, i) => ({ id: it.id || i, en: it.word, hy: it.translation, score: 0, stagesCompleted: [], isInstant: false, isSeen: false, errorCount: 0, repLevel: 0, nextRepDate: null }));
                load(); updateStats();
                $('h-count').innerText = `${words.length} բառ`;
                $('del-in').oninput = e => { const ok = e.target.value === 'DELETE'; $('del-btn').disabled = !ok; $('del-btn').className = ok ? 'flex-1 p-4 bg-rose-600 text-white rounded-2xl font-bold' : 'flex-1 p-4 bg-emerald-100 text-emerald-300 rounded-2xl font-bold'; };
            } catch(e) { console.error(e); }
        }

        const load = () => { const s = localStorage.getItem('usanim_v3_data'); if(s) { const p = JSON.parse(s); words.forEach(w => p.words[w.id] && Object.assign(w, p.words[w.id])); examScores = p.examScores || []; dailyCount = p.dailyCount || 0; } };
        const save = () => { const storage = { words: {}, examScores, dailyCount }; words.forEach(w => storage.words[w.id] = { ...w }); localStorage.setItem('usanim_v3_data', JSON.stringify(storage)); };

        function updateStats() {
            const learned = words.filter(w => w.stagesCompleted.length >= 5 || w.isInstant).length;
            const pct = Math.round((learned / words.length) * 100);
            $('h-pct').innerText = pct + "%"; $('h-bg-line').style.width = pct + "%"; $('p-bar').style.width = pct + "%";
        }

        const exitToMenu = () => { ['view', 'smart-menu'].forEach(id => $(id).classList.add('hidden')); $('app-content').classList.remove('hidden'); updateStats(); window.speechSynthesis.cancel(); };

        function openStage(num) { activeStage = num; activeIndex = 0; toggleView('app-content', 'view'); $('v-title').innerText = `Փուլ ${num}`; renderStage(); }

        function renderStage() {
            const cont = $('content'); cont.innerHTML = "";
            activeList = activeStage === 1 ? words.filter(w => !w.isInstant && !w.isSeen) : 
                         activeStage === 3 ? words.filter(w => !w.stagesCompleted.includes(3) && !w.isInstant) :
                         words.filter(w => !w.stagesCompleted.includes(activeStage) && !w.isInstant);
            if (activeStage === 1) renderS1(); else if (activeStage === 2) renderS2(); else if (activeStage === 3) renderS3(); else renderGen();
        }

        function renderS1() {
            if (activeIndex >= activeList.length) return renderFin();
            const w = activeList[activeIndex];
            $('content').innerHTML = `<div class="w-full bg-white rounded-[3rem] p-12 text-center shadow-xl mb-10 border-b-8 border-emerald-500"><h2 class="text-6xl font-black italic mb-6" onclick="speak('${w.en}')">${w.en}</h2><h3 onclick="this.classList.toggle('revealed')" class="text-3xl font-bold text-emerald-200 blur-text italic">${w.hy}</h3></div><div class="grid grid-cols-2 gap-5 w-full"><button onclick="hS1(true)" class="btn-primary">ԳԻՏԵՄ</button><button onclick="hS1(false)" class="btn-primary !bg-rose-500">ՉԳԻՏԵՄ</button></div>`;
            speak(w.en);
        }
        const hS1 = ok => { const w = activeList[activeIndex]; if(ok) { w.isInstant = true; w.isSeen = true; dailyCount++; } else w.isSeen = true; save(); activeIndex++; renderS1(); };

        function renderS2() {
            const batch = activeList.slice(0, 10); if(!batch.length) return renderFin();
            const w = batch[activeIndex % batch.length];
            const others = words.filter(x => x.id !== w.id).sort(() => 0.5 - Math.random()).slice(0, 3);
            const opts = [...others, w].sort(() => 0.5 - Math.random());
            $('content').innerHTML = `<div class="w-full text-center"><div class="mb-6">${getDots(w.score)}</div><div class="mb-10 text-6xl font-black italic text-emerald-900" onclick="speak('${w.en}')">${w.en}</div><div class="grid grid-cols-1 gap-3 w-full" id="opts"></div><button id="nx-btn" onclick="renderStage()" class="hidden btn-primary mt-8 !bg-slate-800">ՀԱՋՈՐԴԸ</button></div>`;
            speak(w.en);
            opts.forEach(o => {
                const b = document.createElement('button'); b.className = "w-full p-5 bg-white border-2 border-emerald-100 rounded-2xl font-bold text-xl"; b.innerText = o.hy;
                b.onclick = () => {
                    if(o.id === w.id) { w.score = Math.min(5, w.score + 1); b.className = "w-full p-5 bg-emerald-500 text-white rounded-2xl font-bold text-xl"; if(w.score >= 5) { w.score = 0; w.stagesCompleted.push(2); } setTimeout(renderStage, 600); }
                    else { w.score = Math.max(0, w.score - 1); w.errorCount++; b.className = "w-full p-5 bg-rose-500 text-white rounded-2xl font-bold text-xl"; $('nx-btn').classList.remove('hidden'); }
                    save();
                };
                $('opts').appendChild(b);
            });
        }

        function renderS3() {
            const batch = activeList.slice(0, 5); if(!batch.length) return renderFin();
            const l = [...batch].sort(() => 0.5 - Math.random()), r = [...batch].sort(() => 0.5 - Math.random());
            $('content').innerHTML = `<div class="grid grid-cols-2 gap-4 w-full"><div id="en-l" class="space-y-4"></div><div id="hy-l" class="space-y-4"></div></div><button id="n-btn" onclick="renderStage()" class="hidden btn-primary mt-8">ՀԱՋՈՐԴ ԽՈՒՄԲԸ</button>`;
            l.forEach(w => { const d = document.createElement('div'); d.className = 'match-item'; d.innerHTML = `<span>${w.en}</span><div class="mt-1">${getDots(w.score)}</div>`; d.onclick = () => selM(d, 'en', w); $('en-l').appendChild(d); });
            r.forEach(w => { const d = document.createElement('div'); d.className = 'match-item'; d.innerHTML = `<span>${w.hy}</span>`; d.onclick = () => selM(d, 'hy', w); $('hy-l').appendChild(d); });
        }

        function selM(el, ty, w) {
            if(el.classList.contains('match-correct')) return;
            document.querySelectorAll('.match-item').forEach(i => i.classList.remove('match-selected')); el.classList.add('match-selected');
            if(ty === 'en') { selEn = { el, w }; speak(w.en); } else selHy = { el, w };
            if(selEn && selHy) {
                if(selEn.w.id === selHy.w.id) { [selEn.el, selHy.el].forEach(i => i.className = 'match-item match-correct'); selEn.w.score = Math.min(5, selEn.w.score + 1); if(selEn.w.score >= 5) { selEn.w.score = 0; selEn.w.stagesCompleted.push(3); } }
                else { [selEn.el, selHy.el].forEach(i => i.classList.add('match-wrong')); selEn.w.score = Math.max(0, selEn.w.score - 1); selEn.w.errorCount++; setTimeout(() => [selEn.el, selHy.el].forEach(i => i.classList.remove('match-wrong', 'match-selected')), 400); }
                save(); selEn = selHy = null; if(document.querySelectorAll('.match-correct').length === 10) $('n-btn').classList.remove('hidden');
            }
        }

        function renderGen() {
            const batch = activeList.slice(0, 10); if(!batch.length) return renderFin();
            const w = batch[activeIndex % batch.length];
            const q = activeStage === 6 ? "🔊" : (activeStage === 4 ? w.hy : w.en), a = activeStage === 4 ? w.en : w.hy;
            $('content').innerHTML = `<div class="w-full text-center"><div class="mb-6">${getDots(w.score)}</div><div class="mb-10 text-6xl font-black italic text-emerald-900" onclick="speak('${w.en}')">${q}</div><input id="s-in" class="w-full p-6 border-4 border-emerald-100 rounded-[2.5rem] text-center text-2xl outline-none" placeholder="..." autocomplete="off"><button id="c-btn" onclick="checkGen('${a}', '${w.id}')" class="btn-primary mt-8">ՍՏՈՒԳԵԼ</button><button id="nx-btn" onclick="renderStage()" class="hidden btn-primary mt-8 !bg-slate-800">ՀԱՋՈՐԴԸ</button></div>`;
            if(activeStage !== 6) speak(w.en); $('s-in').focus();
        }

        function checkGen(a, id) {
            const inVal = $('s-in').value.trim().toLowerCase(), w = words.find(x => x.id == id);
            if(inVal === a.toLowerCase()) { w.score = Math.min(5, w.score + 1); if(w.score >= 5) { w.score = 0; w.stagesCompleted.push(activeStage); if(w.stagesCompleted.length >= 5) setNextRep(w); } setTimeout(renderStage, 600); }
            else { w.score = Math.max(0, w.score - 1); w.errorCount++; $('s-in').className = "w-full p-6 border-4 border-rose-500 bg-rose-500 text-white rounded-[2.5rem] text-center text-2xl outline-none"; $('s-in').value = a; $('c-btn').classList.add('hidden'); $('nx-btn').classList.remove('hidden'); }
            save();
        }

        const setNextRep = w => { const d = new Date(); let dCount = w.repLevel === 0 ? 7 : (w.repLevel === 1 ? 30 : 90); d.setDate(d.getDate() + dCount); w.nextRepDate = d.toISOString(); };

        function openSmart() {
            toggleView('app-content', 'smart-menu');
            const now = new Date(), reps = words.filter(w => w.nextRepDate && new Date(w.nextRepDate) <= now), hards = words.filter(w => w.errorCount >= 5);
            $('smart-cont').innerHTML = `<div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-l-[12px] border-emerald-500"><h3 class="font-black text-emerald-900 uppercase">Կրկնություն</h3><button onclick="startR()" class="btn-primary !p-4 mt-4">Սկսել (${reps.length})</button></div><div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-l-[12px] border-rose-500"><h3 class="font-black text-rose-900 uppercase">Շտկում</h3><button onclick="startC()" class="btn-primary !p-4 !bg-rose-600 mt-4">Սկսել (${hards.length})</button></div>`;
        }
        const startR = () => { activeList = words.filter(w => w.nextRepDate && new Date(w.nextRepDate) <= new Date()); if(!activeList.length) return; activeIndex = 0; toggleView('smart-menu', 'view'); renderRep(); };
        function renderRep() { const w = activeList[activeIndex]; $('content').innerHTML = `<div class="w-full bg-white rounded-[3.5rem] p-12 text-center shadow-xl mb-10 border-b-8 border-emerald-500"><h2 class="text-6xl font-black mb-6">${w.en}</h2><h3 onclick="this.classList.toggle('revealed')" class="text-3xl font-bold text-emerald-100 blur-text">${w.hy}</h3></div><div class="grid grid-cols-2 gap-5 w-full"><button onclick="hR(true)" class="btn-primary">ԳԻՏԵՄ</button><button onclick="hR(false)" class="btn-primary !bg-rose-500">ՉԳԻՏԵՄ</button></div>`; speak(w.en); }
        function hR(ok) { const w = activeList[activeIndex]; if(ok) { w.repLevel++; setNextRep(w); activeIndex++; if(activeIndex >= activeList.length) exitToMenu(); else renderRep(); } else { Object.assign(w, {score:0, stagesCompleted:[], isInstant:false, isSeen:false, repLevel:0, nextRepDate:null, errorCount:0}); exitToMenu(); } save(); }
        const startC = () => { activeList = words.filter(w => w.errorCount >= 5); if(!activeList.length) return; activeIndex = 0; toggleView('smart-menu', 'view'); renderCor(); };
        function renderCor() { const w = activeList[activeIndex % activeList.length]; $('content').innerHTML = `<div class="w-full text-center"><div class="mb-10 bg-white rounded-[3.5rem] p-12 shadow-xl border-b-8 border-rose-500"><h2 class="text-6xl mb-6">${w.en}</h2><h3 onclick="this.classList.toggle('revealed')" class="text-3xl font-bold text-rose-100 blur-text">${w.hy}</h3></div><div class="grid grid-cols-2 gap-5 w-full"><button onclick="hC(true)" class="btn-primary">ԳԻՏԵՄ</button><button onclick="hC(false)" class="btn-primary !bg-rose-500">ՉԳԻՏԵՄ</button></div></div>`; speak(w.en); }
        function hC(ok) { const w = activeList[activeIndex % activeList.length]; if(ok) { w.score++; if(w.score >= 5) { w.errorCount = 0; w.score = 0; activeList.splice(activeIndex % activeList.length, 1); } else activeIndex++; } else { w.score = Math.max(0, w.score - 1); activeIndex++; } save(); if(activeList.length) renderCor(); else exitToMenu(); }

        function openStats() { toggleView('app-content', 'smart-menu'); const l = words.filter(w => w.stagesCompleted.length >= 5 || w.isInstant).length, avg = examScores.length ? Math.round(examScores.reduce((a,b)=>a+b,0)/examScores.length) : 0; $('smart-cont').innerHTML = `<div class="bg-emerald-900 text-white p-10 rounded-[3.5rem] shadow-2xl"><h2 class="text-2xl font-black uppercase mb-8">Վիճակագրություն</h2><div class="space-y-4 text-left font-bold text-emerald-100"><div class="flex justify-between border-b border-emerald-800 pb-2"><span>Առաջընթաց:</span><span class="text-emerald-400">${Math.round((l/words.length)*100)}%</span></div><div class="flex justify-between border-b border-emerald-800 pb-2"><span>Սովորած:</span><span class="text-emerald-400">${l}</span></div><div class="flex justify-between border-b border-emerald-800 pb-2"><span>Քննություն:</span><span class="text-emerald-400">${avg}%</span></div><div class="flex justify-between"><span>Այսօր:</span><span class="text-emerald-400">${dailyCount}</span></div></div></div>`; }
        function openExam() { activeList = [...words].sort(()=>0.5-Math.random()).slice(0,50); activeIndex = 0; let cor = 0; toggleView('app-content', 'view'); $('v-title').innerText = "Քննություն"; renderEx(cor); }
        function renderEx(cor) { if(activeIndex >= activeList.length) { const pct = Math.round((cor/activeList.length)*100); examScores.push(pct); save(); return renderFin(`Արդյունք: ${pct}%`); } const w = activeList[activeIndex]; $('content').innerHTML = `<div class="w-full text-center"><p class="text-xs font-bold text-emerald-400 mb-6 uppercase">${activeIndex+1} / ${activeList.length}</p><h2 class="text-6xl font-black italic text-emerald-900 mb-10">${w.en}</h2><input id="ex-in" class="w-full p-6 border-4 border-emerald-100 rounded-3xl text-center text-xl outline-none" autofocus autocomplete="off"><button id="ex-btn" class="btn-primary mt-8">ՀԱՋՈՐԴԸ</button></div>`; $('ex-btn').onclick = () => { if($('ex-in').value.trim().toLowerCase() === w.hy.toLowerCase()) cor++; activeIndex++; renderEx(cor); }; }
        const getDots = s => `<div class="flex justify-center gap-1">${Array(5).fill(0).map((_,i)=>s>i?`<span class="dot dot-active"></span>`:`<span class="dot"></span>`).join('')}</div>`;
        const renderFin = (e="") => $('content').innerHTML = `<div class="text-center p-12 bg-white rounded-[3.5rem] shadow-2xl border-b-8 border-emerald-500"><div class="text-7xl mb-6">🏆</div><h2 class="text-3xl font-black text-emerald-900 italic">Գերազանց է</h2><p class="text-slate-500 font-bold mb-8">${e||"Ավարտվեց"}</p><button onclick="exitToMenu()" class="btn-primary">ՎԵՐԱԴԱՌՆԱԼ</button></div>`;
        const confirmDelete = () => { localStorage.removeItem('usanim_v3_data'); location.reload(); };
        init();
    </script>
</body>
</html>
