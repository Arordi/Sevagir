<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usanim Pro - Լեզուների ուսուցում</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #064e3b; user-select: none; touch-action: manipulation; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .home-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; border-left: 10px solid #059669; background: #065f46; }
        .home-card:active { transform: scale(0.96); }
        
        /* 3D Tilt effect for stage cards */
        .stage-card { 
            transition: transform 0.1s ease, box-shadow 0.2s;
            transform-style: preserve-3d;
            cursor: pointer; 
            background-color: #065f46; 
            border: 2px solid #059669; 
            border-radius: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            color: white;
        }
        .stage-card:active { transform: scale(0.95); background-color: #059669; }
        .stage-card span:last-child { color: #a7f3d0; font-weight: 800; font-size: 11px; text-transform: uppercase; margin-top: 4px; }
        
        /* Breathing effect for primary buttons */
        .btn-primary { 
            background: linear-gradient(135deg, #059669 0%, #064e3b 100%); 
            color: white; 
            padding: 1.25rem; 
            border-radius: 1.25rem; 
            font-weight: bold; 
            width: 100%; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); 
            border: none;
            transition: all 0.2s;
            animation: breathe 2s infinite ease-in-out;
        }
        @keyframes breathe {
            0% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(5, 150, 105, 0); }
            100% { box-shadow: 0 0 0 0 rgba(5, 150, 105, 0); }
        }
        /* Wave animation for speaker in stage 6 */
        .speaker-wave {
            animation: wave 0.6s infinite;
        }
        @keyframes wave {
            0% { box-shadow: 0 0 0 0 #10b981; }
            50% { box-shadow: 0 0 0 12px rgba(16, 185, 129, 0.3); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
        /* Splash animation for welcome screen */
        .splash-word {
            animation: slideIn 0.8s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        /* Confetti canvas */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        .blur-text { filter: blur(8px); transition: all 0.3s ease; cursor: pointer; }
        .blur-text.revealed { filter: blur(0); }
        
        .star-box { position: relative; display: inline-flex; align-items: center; justify-content: center; width: 40px; height: 40px; }
        .star-icon { font-size: 36px; transition: all 0.3s ease; }
        .star-text { 
            position: absolute; 
            top: 55%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            font-size: 11px; 
            font-weight: 900; 
            color: #064e3b; 
            pointer-events: none;
        }

        .match-item { border: 2px solid #065f46; border-radius: 20px; padding: 12px; text-align: center; cursor: pointer; min-height: 70px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 600; background: #064e3b; transition: 0.2s; color: white; }
        .match-selected { border-color: #10b981; background-color: #065f46; }
        .match-correct { border-color: #22c55e; background-color: #14532d; color: #4ade80; }
        .match-wrong { border-color: #ef4444; background-color: #450a0a; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .hidden { display: none !important; }
        
        .choice-btn { transition: all 0.2s; border: 2px solid #065f46; background: #065f46; color: white; }
        .choice-btn:active { transform: scale(0.98); background: #059669; }

        input { background: #064e3b !important; color: white !important; border-color: #059669 !important; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #059669; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">
    <canvas id="confetti-canvas"></canvas>

    <div id="welcome-screen" class="min-h-screen flex flex-col p-6 max-w-lg mx-auto">
        <div class="mt-20 mb-12 text-center">
            <h1 class="text-5xl font-black text-emerald-400 tracking-tight mb-2 italic splash-word">Usanim</h1>
            <p class="text-emerald-500 font-bold tracking-[0.3em] uppercase text-xs splash-word" style="animation-delay: 0.2s;">Premium Learning</p>
        </div>
        <div class="space-y-4">
            <div onclick="goToAppMenu()" class="home-card glass p-8 rounded-[2.5rem] shadow-xl flex items-center justify-between relative overflow-hidden">
                <div class="flex items-center gap-5 z-10">
                    <div class="w-16 h-16 bg-emerald-900/50 rounded-2xl flex items-center justify-center text-3xl border border-emerald-700">🇬🇧</div>
                    <div>
                        <h2 class="text-2xl font-black text-white leading-tight">A1 Մակարդակ</h2>
                        <div class="flex items-center gap-2 mt-1">
                            <p id="home-word-count" class="text-emerald-300 text-xs font-bold uppercase">...</p>
                            <span class="text-emerald-700">|</span>
                            <p id="home-progress-pct" class="text-emerald-400 text-xs font-black">0%</p>
                        </div>
                    </div>
                </div>
                <div class="z-10 w-10 h-10 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-md">➔</div>
                <div id="home-bg-progress" class="absolute left-0 bottom-0 h-1 bg-emerald-400 transition-all duration-1000" style="width: 0%"></div>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <div class="bg-emerald-900 p-4 text-white sticky top-0 z-50 shadow-lg w-full border-b border-emerald-800">
            <div class="max-w-4xl mx-auto flex justify-between items-center mb-2">
                <div onclick="goToWelcome()" class="cursor-pointer flex items-center gap-2">
                    <span class="text-xl">🏠</span>
                    <h1 class="font-bold text-lg leading-none italic uppercase tracking-tighter">Usanim A1</h1>
                </div>
                <button onclick="showDeleteModal()" class="text-[10px] bg-white/10 hover:bg-white/20 text-white px-4 py-1.5 rounded-full font-black uppercase tracking-widest transition-colors">Reset</button>
            </div>
            <div class="max-w-4xl mx-auto w-full bg-black/30 rounded-full h-1.5 overflow-hidden">
                <div id="progress-bar" class="bg-emerald-400 h-full rounded-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div id="menu" class="max-w-4xl mx-auto p-4 grid grid-cols-2 md:grid-cols-3 gap-4 py-8">
            <button class="stage-card" data-tilt><span class="text-3xl">🗂️</span><span>Փուլ 1</span></button>
            <button class="stage-card" data-tilt><span class="text-3xl">🔘</span><span>Փուլ 2</span></button>
            <button class="stage-card" data-tilt><span class="text-3xl">🧩</span><span>Փուլ 3</span></button>
            <button class="stage-card" data-tilt><span class="text-3xl">⌨️</span><span>Փուլ 4</span></button>
            <button class="stage-card" data-tilt><span class="text-3xl">🔄</span><span>Փուլ 5</span></button>
            <button class="stage-card" data-tilt><span class="text-3xl">🎧</span><span>Փուլ 6</span></button>
            <button class="stage-card" data-tilt><span class="text-3xl">🎓</span><span>Փուլ 7</span></button>
            <button class="stage-card" data-tilt><span class="text-3xl">📝</span><span>Փուլ 8</span></button>
            <button class="stage-card" data-tilt><span class="text-3xl">📊</span><span>Փուլ 9</span></button>
        </div>
    </div>

    <div id="view" class="hidden p-4 min-h-screen max-w-2xl mx-auto">
        <div class="flex justify-between items-center mb-8 pt-4">
            <button onclick="exitToMenu()" class="font-black text-emerald-400 text-xs uppercase tracking-widest bg-emerald-900/50 px-4 py-2 rounded-full border border-emerald-700">⬅ ԵԼՔ</button>
            <div id="view-title" class="text-[10px] font-black text-emerald-300 uppercase tracking-[0.4em]"></div>
            <div class="w-12"></div>
        </div>
        <div id="content" class="flex flex-col items-center w-full"></div>
    </div>

    <div id="smart-menu" class="hidden max-w-2xl mx-auto p-6 space-y-6">
        <button onclick="exitToMenu()" class="font-black text-emerald-400 text-xs uppercase tracking-widest bg-emerald-900/50 px-4 py-2 rounded-full border border-emerald-700">⬅ ԵԼՔ</button>
        <div id="smart-container" class="space-y-4"></div>
    </div>

    <div id="delete-modal" class="hidden fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-emerald-900 p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl border border-emerald-700">
            <h2 class="text-xl font-black text-white mb-4 uppercase">Ջնջել ամբողջը</h2>
            <p class="text-emerald-300 text-sm mb-6">Գրիր <b class="text-white">DELETE</b> հաստատելու համար</p>
            <input type="text" id="delete-confirm-input" class="w-full p-4 border-2 border-emerald-700 rounded-2xl text-center mb-6 uppercase outline-none focus:border-emerald-400 transition-all">
            <div class="flex gap-3">
                <button onclick="hideDeleteModal()" class="flex-1 p-4 bg-emerald-800 text-emerald-100 rounded-2xl font-bold">ՈՉ</button>
                <button id="real-delete-btn" onclick="confirmFinalDelete()" disabled class="flex-1 p-4 bg-emerald-700 text-emerald-500 rounded-2xl font-bold transition-all">ԱՅՈ</button>
            </div>
        </div>
    </div>

    <script>
        let words = [], activeStage = 1, activeIndex = 0, activeList = [], canProceed = false;
        let examScores = [], dailyWordsCount = 0, dailyGoal = 20;
        let selectedEn = null, selectedHy = null;

        // === NEW EFFECTS FUNCTIONS (no logic change) ===
        function triggerHaptic() {
            if (navigator.vibrate) navigator.vibrate(50);
        }
        function showConfetti() {
            const canvas = document.getElementById('confetti-canvas');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const ctx = canvas.getContext('2d');
            let particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 6 + 2,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                    speedY: Math.random() * 5 + 2,
                    speedX: (Math.random() - 0.5) * 2
                });
            }
            let animating = true;
            function draw() {
                if (!animating) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    p.y += p.speedY;
                    p.x += p.speedX;
                    if (p.y > canvas.height) p.y = -10;
                });
                requestAnimationFrame(draw);
            }
            draw();
            setTimeout(() => { animating = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }, 1500);
        }
        function animateNumber(element, start, end, duration) {
            let range = end - start;
            let stepTime = Math.abs(Math.floor(duration / range));
            let current = start;
            let timer = setInterval(() => {
                current += (current < end ? 1 : -1);
                element.innerText = current;
                if (current === end) clearInterval(timer);
            }, stepTime);
        }
        // Initialize 3D tilt on stage cards
        document.querySelectorAll('[data-tilt]').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                const rotateX = (y - centerY) / 20;
                const rotateY = (centerX - x) / 20;
                card.style.transform = `perspective(500px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(500px) rotateX(0deg) rotateY(0deg)';
            });
        });

        // === ORIGINAL LOGIC (unchanged) ===
        async function initApp() {
            try {
                const response = await fetch('./vocabulary.json');
                const data = await response.json();
                words = data.map((item, index) => ({
                    id: item.id || index, en: item.word, hy: item.translation,
                    score: 0, stagesCompleted: [], isInstant: false, isSeen: false,
                    errorCount: 0, learnedDate: null, repLevel: 0, nextRepDate: null
                }));
                loadProgress();
                updateStats();
                document.getElementById('home-word-count').innerText = `${words.length} բառ`;
                
                document.getElementById('delete-confirm-input').addEventListener('input', function(e) {
                    const btn = document.getElementById('real-delete-btn');
                    const isMatch = e.target.value.toUpperCase() === 'DELETE';
                    btn.disabled = !isMatch;
                    btn.className = isMatch ? 'flex-1 p-4 bg-rose-600 text-white rounded-2xl font-bold' : 'flex-1 p-4 bg-emerald-800 text-emerald-500 rounded-2xl font-bold';
                });
                // Assign click handlers after dynamic generation (for stage cards)
                document.querySelectorAll('.stage-card').forEach((btn, idx) => {
                    btn.onclick = () => openStage(idx+1);
                });
            } catch (e) { console.error("Error loading app:", e); }
        }

        function loadProgress() {
            const saved = localStorage.getItem('usanim_v3_data');
            if(saved) {
                const p = JSON.parse(saved);
                words.forEach(w => {
                    if(p.words && p.words[w.id]) Object.assign(w, p.words[w.id]);
                });
                examScores = p.examScores || [];
                dailyWordsCount = p.dailyWordsCount || 0;
                dailyGoal = p.dailyGoal || 20;
            }
        }

        function saveProgress() {
            const storage = { words: {}, examScores, dailyWordsCount, dailyGoal };
            words.forEach(w => {
                storage.words[w.id] = { 
                    score: w.score, stagesCompleted: w.stagesCompleted, isInstant: w.isInstant, 
                    isSeen: w.isSeen, errorCount: w.errorCount, learnedDate: w.learnedDate,
                    repLevel: w.repLevel, nextRepDate: w.nextRepDate
                };
            });
            localStorage.setItem('usanim_v3_data', JSON.stringify(storage));
        }

        function updateStats() {
            const learned = words.filter(w => w.isInstant || [2, 3, 4, 5, 6].every(s => w.stagesCompleted.includes(s))).length;
            const pct = Math.round((learned / words.length) * 100);
            document.getElementById('home-progress-pct').innerText = pct + "%";
            document.getElementById('home-bg-progress').style.width = pct + "%";
            document.getElementById('progress-bar').style.width = pct + "%";
        }

        function getStars(word) {
            const stages = [2, 3, 4, 5, 6];
            let html = '<div class="flex justify-center gap-1 mb-6">';
            stages.forEach(s => {
                const isCompleted = word.stagesCompleted.includes(s);
                const isActive = (activeStage === s);
                let colorClass = isCompleted ? 'text-yellow-400' : 'text-emerald-800';
                if (isActive && !isCompleted) colorClass = 'text-emerald-500';
                html += `
                    <div class="star-box">
                        <span class="star-icon ${colorClass}">★</span>
                        ${isActive && !isCompleted ? `<span class="star-text !text-white">${word.score}</span>` : ''}
                        ${isCompleted ? `<span class="star-text">✓</span>` : ''}
                    </div>`;
            });
            html += '</div>';
            return html;
        }

        function cleanText(text) {
            return text.trim().toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
        }

        function goToAppMenu() { document.getElementById('welcome-screen').classList.add('hidden'); document.getElementById('app-content').classList.remove('hidden'); }
        function goToWelcome() { document.getElementById('app-content').classList.add('hidden'); document.getElementById('welcome-screen').classList.remove('hidden'); updateStats(); }

        function openStage(num) {
            activeStage = num; activeIndex = 0;
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = `Փուլ ${num}`;
            
            if (num === 1) {
                activeList = words.filter(w => !w.isInstant && !w.stagesCompleted.includes(1));
            } else {
                activeList = words.filter(w => !w.isInstant && !w.stagesCompleted.includes(activeStage)).slice(0, 10);
            }
            initStageLogic();
        }

        function initStageLogic() {
            const container = document.getElementById('content');
            container.innerHTML = "";
            if (activeList.length === 0) {
                if (activeStage === 1) renderStage1Finish();
                else renderFinish();
                return;
            }
            if (activeStage === 1) renderStage1();
            else if (activeStage === 3) renderStage3();
            else renderGenericStage();
        }

        function renderStage1Finish() {
            const notLearnedCount = words.filter(w => !w.isInstant && !w.stagesCompleted.includes(1)).length;
            document.getElementById('content').innerHTML = `
                <div class="text-center p-12 bg-emerald-800 rounded-[3.5rem] shadow-2xl w-full border-b-8 border-emerald-500">
                    <div class="text-7xl mb-6">🎉</div>
                    <h2 class="text-2xl font-black mb-4 text-white italic">Փուլ 1-ի ցիկլն ավարտված է</h2>
                    ${notLearnedCount > 0 ? `<p class="text-emerald-200 mb-6 font-bold">Դեռ չսովորած բառեր՝ ${notLearnedCount}</p>` : '<p class="text-emerald-200 mb-6 font-bold">Բոլոր բառերը սովորել ես։ Հիանալի է։</p>'}
                    <div class="flex flex-col gap-3">
                        ${notLearnedCount > 0 ? `<button onclick="openStage(1)" class="btn-primary !bg-amber-600">🔄 ԿՐԿՆԵԼ ՉՍՈՎՈՐԱԾԸ</button>` : ''}
                        <button onclick="exitToMenu()" class="btn-primary">🏠 ԳԼԽԱՎՈՐ</button>
                    </div>
                </div>`;
        }

        function renderStage1() {
            const word = activeList[activeIndex % activeList.length];
            document.getElementById('content').innerHTML = `
                <div class="w-full bg-emerald-800 rounded-[3rem] p-12 text-center shadow-xl mb-10 border-b-8 border-emerald-500">
                    <h2 class="text-6xl font-black text-white mb-6 italic" onclick="speak('${word.en}')">${word.en}</h2>
                    <h3 onclick="this.classList.toggle('revealed')" class="text-3xl font-bold text-emerald-600 blur-text italic">${word.hy}</h3>
                </div>
                <div class="grid grid-cols-2 gap-5 w-full">
                    <button onclick="handleStage1(true)" class="btn-primary">ԳԻՏԵՄ</button>
                    <button onclick="handleStage1(false)" class="btn-primary !bg-emerald-900 border border-emerald-700">ՉԳԻՏԵՄ</button>
                </div>`;
            speak(word.en);
        }

        function handleStage1(known) {
            const w = activeList[activeIndex % activeList.length];
            if(known) {
                w.isInstant = true; 
                w.isSeen = true;
                w.learnedDate = new Date().toISOString().split('T')[0];
                dailyWordsCount++;
                saveProgress();
                activeIndex++;
                if (activeIndex >= activeList.length) initStageLogic();
                else renderStage1();
                triggerHaptic();
                showConfetti(); // celebration
            } else { 
                w.isSeen = true; 
                w.stagesCompleted = []; 
                w.score = 0;
                saveProgress();
                activeIndex++;
                if (activeIndex >= activeList.length) initStageLogic();
                else renderStage1();
                triggerHaptic();
            }
        }

        function renderStage3() {
            const batch = activeList.slice(0, 5);
            document.getElementById('content').innerHTML = `
                <div class="grid grid-cols-2 gap-4 w-full items-start">
                    <div class="space-y-4" id="en-list"></div>
                    <div class="space-y-4" id="hy-list"></div>
                </div>
                <button id="next-batch-btn" onclick="initStageLogic()" class="hidden btn-primary mt-8">ՀԱՋՈՐԴԸ</button>
            `;
            const leftSide = [...batch].sort(() => Math.random() - 0.5);
            const rightSide = [...batch].sort(() => Math.random() - 0.5);
            leftSide.forEach(w => {
                const el = document.createElement('div'); el.className = 'match-item'; el.innerHTML = `<span>${w.en}</span>`;
                el.onclick = () => selectMatch(el, 'en', w); document.getElementById('en-list').appendChild(el);
            });
            rightSide.forEach(w => {
                const el = document.createElement('div'); el.className = 'match-item'; el.innerHTML = `<span>${w.hy}</span>`;
                el.onclick = () => selectMatch(el, 'hy', w); document.getElementById('hy-list').appendChild(el);
            });
        }

        function selectMatch(el, type, word) {
            if(el.classList.contains('match-correct')) return;
            document.querySelectorAll(`.match-item`).forEach(i => i.classList.remove('match-selected'));
            el.classList.add('match-selected');
            if(type === 'en') { selectedEn = { el, word }; speak(word.en); }
            else selectedHy = { el, word };
            if(selectedEn && selectedHy) {
                if(selectedEn.word.id === selectedHy.word.id) {
                    selectedEn.el.className = 'match-item match-correct'; selectedHy.el.className = 'match-item match-correct';
                    selectedEn.word.score = Math.min(10, selectedEn.word.score + 1);
                    if(selectedEn.word.score >= 10) { 
                        selectedEn.word.score = 0; 
                        selectedEn.word.stagesCompleted.push(3);
                        showConfetti();
                        triggerHaptic();
                    }
                } else {
                    selectedEn.el.classList.add('match-wrong'); selectedHy.el.classList.add('match-wrong');
                    selectedEn.word.score = Math.max(0, selectedEn.word.score - 1);
                    triggerHaptic();
                    setTimeout(() => { document.querySelectorAll('.match-wrong').forEach(i => i.classList.remove('match-wrong', 'match-selected')); }, 400);
                }
                saveProgress(); selectedEn = null; selectedHy = null;
                if(document.querySelectorAll('.match-correct').length === (activeList.slice(0,5).length * 2)) document.getElementById('next-batch-btn').classList.remove('hidden');
            }
        }

        function renderGenericStage() {
            const word = activeList[activeIndex % activeList.length];
            if (activeStage === 2) { renderMultipleChoice(word); return; }
            let question = word.en, answer = word.hy;
            if(activeStage === 4) { question = word.hy; answer = word.en; }
            if(activeStage === 5) { question = word.en; answer = word.hy; }
            if(activeStage === 6) { question = "🔊"; answer = word.en; }
            
            let speakerButton = '';
            if (activeStage === 6) {
                speakerButton = `<button id="speaker-stage6" onclick="speak('${word.en}'); document.getElementById('speaker-stage6').classList.add('speaker-wave'); setTimeout(()=>document.getElementById('speaker-stage6').classList.remove('speaker-wave'),600)" class="text-4xl mb-4 bg-emerald-700 p-3 rounded-full">🔊</button>`;
            }
            
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center">
                    <div class="mb-2">${getStars(word)}</div>
                    ${speakerButton}
                    <div class="mb-10 text-6xl font-black text-white italic" onclick="speak('${word.en}')">${question}</div>
                    <input type="text" id="stage-input" autofocus class="w-full p-6 border-4 border-emerald-800 rounded-[2.5rem] text-center text-2xl outline-none focus:border-emerald-400 transition-all shadow-inner" placeholder="..." autocomplete="off">
                    <button id="check-btn" onclick="checkGeneric('${answer}')" class="btn-primary mt-8">ՍՏՈՒԳԵԼ</button>
                    <button id="next-btn" onclick="initStageLogic()" class="hidden btn-primary mt-8 !bg-emerald-900">ՀԱՋՈՐԴԸ</button>
                </div>`;
            if (activeStage === 6) {
                setTimeout(() => speak(word.en), 200);
            } else {
                speak(word.en);
            }
            setTimeout(() => document.getElementById('stage-input')?.focus(), 50);
        }

        function renderMultipleChoice(word) {
            let options = [word.hy];
            let otherWords = words.filter(w => w.id !== word.id).sort(() => 0.5 - Math.random());
            options.push(...otherWords.slice(0, 3).map(w => w.hy));
            options.sort(() => 0.5 - Math.random());
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center">
                    <div class="mb-2">${getStars(word)}</div>
                    <div class="mb-10 text-6xl font-black text-white italic" onclick="speak('${word.en}')">${word.en}</div>
                    <div class="grid grid-cols-1 gap-3 w-full">
                        ${options.map(opt => `<button onclick="checkChoice('${opt}', '${word.hy}')" class="choice-btn p-5 border-2 border-emerald-800 rounded-2xl font-bold text-lg">${opt}</button>`).join('')}
                    </div>
                </div>`;
            speak(word.en);
        }

        function checkChoice(selected, correct) {
            const word = activeList[activeIndex % activeList.length];
            if(cleanText(selected) === cleanText(correct)) {
                word.score = Math.min(10, word.score + 1);
                if(word.score >= 10) { 
                    word.score = 0; 
                    word.stagesCompleted.push(2);
                    showConfetti();
                    triggerHaptic();
                }
                activeIndex++;
            } else { 
                word.score = Math.max(0, word.score - 1); 
                word.errorCount++; 
                activeIndex++;
                triggerHaptic();
            }
            saveProgress(); initStageLogic();
        }

        function checkGeneric(correct) {
            const input = document.getElementById('stage-input');
            const word = activeList[activeIndex % activeList.length];
            if(cleanText(input.value) === cleanText(correct)) {
                word.score = Math.min(10, word.score + 1);
                input.className = "w-full p-6 border-4 border-emerald-500 bg-emerald-600 text-white rounded-[2.5rem] text-center text-2xl outline-none";
                if(word.score >= 10) { 
                    word.score = 0; 
                    word.stagesCompleted.push(activeStage);
                    if([2,3,4,5,6].every(s => word.stagesCompleted.includes(s))) {
                        word.learnedDate = new Date().toISOString().split('T')[0];
                        dailyWordsCount++;
                    }
                    showConfetti();
                    triggerHaptic();
                }
                activeIndex++;
                setTimeout(initStageLogic, 600);
            } else {
                word.score = Math.max(0, word.score - 1); word.errorCount++;
                input.className = "w-full p-6 border-4 border-rose-600 bg-rose-900 text-white rounded-[2.5rem] text-center text-2xl outline-none";
                input.value = correct;
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
                triggerHaptic();
            }
            saveProgress();
        }

        function openSmartStage() {
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('smart-menu').classList.remove('hidden');
            const container = document.getElementById('smart-container'); container.innerHTML = "";
            const now = new Date();
            const repWords = words.filter(w => w.nextRepDate && new Date(w.nextRepDate) <= now);
            const hardWords = words.filter(w => w.errorCount >= 5);
            container.innerHTML = `
                <div class="bg-emerald-800 p-6 rounded-[2.5rem] shadow-xl border-l-[12px] border-emerald-500">
                    <h3 class="font-black text-white text-xl mb-1 italic">ԿՐԿՆՈՒԹՅՈՒՆ</h3>
                    <p class="text-sm text-emerald-300 mb-6 font-bold uppercase tracking-tighter">Ինտերվալային ուսուցում</p>
                    <button onclick="startRepetition()" class="btn-primary !p-4 !rounded-2xl">ՍԿՍԵԼ (${repWords.length})</button>
                </div>
                <div class="bg-emerald-800 p-6 rounded-[2.5rem] shadow-xl border-l-[12px] border-rose-500">
                    <h3 class="font-black text-rose-300 text-xl mb-1 italic">ՇՏԿՈՒՄ</h3>
                    <p class="text-sm text-emerald-300 mb-6 font-bold uppercase tracking-tighter">Դժվար բառերի վարժանք</p>
                    <button onclick="startCorrection()" class="btn-primary !p-4 !rounded-2xl !bg-rose-900 border border-rose-700">ՍԿՍԵԼ (${hardWords.length})</button>
                </div>`;
        }

        function startRepetition() {
            const now = new Date(); activeList = words.filter(w => w.nextRepDate && new Date(w.nextRepDate) <= now);
            if(activeList.length === 0) return alert("Կրկնելու բան դեռ չկա:");
            activeIndex = 0; document.getElementById('smart-menu').classList.add('hidden'); document.getElementById('view').classList.remove('hidden');
            renderRepCard();
        }

        function renderRepCard() {
            const word = activeList[activeIndex];
            document.getElementById('content').innerHTML = `
                <div class="w-full bg-emerald-800 rounded-[3.5rem] p-12 text-center shadow-2xl mb-10 border-b-8 border-emerald-500">
                    <h2 class="text-6xl font-black text-white mb-6 italic">${word.en}</h2>
                    <h3 onclick="this.classList.toggle('revealed')" class="text-3xl font-bold text-emerald-900 blur-text italic">${word.hy}</h3>
                </div>
                <div class="grid grid-cols-2 gap-5 w-full">
                    <button onclick="handleRep(true)" class="btn-primary">ԳԻՏԵՄ</button>
                    <button onclick="handleRep(false)" class="btn-primary !bg-emerald-900">ՉԳԻՏԵՄ</button>
                </div>`;
            speak(word.en);
        }

        function handleRep(known) {
            const word = activeList[activeIndex];
            if(known) { word.repLevel++; setNextRep(word); activeIndex++; if(activeIndex >= activeList.length) exitToMenu(); else renderRepCard(); triggerHaptic(); showConfetti(); }
            else { word.score = 0; word.stagesCompleted = []; word.repLevel = 0; word.nextRepDate = null; alert("Զրոյացվեց:"); exitToMenu(); triggerHaptic(); }
            saveProgress();
        }

        function setNextRep(word) {
            const now = new Date(); let days = word.repLevel === 1 ? 7 : (word.repLevel === 2 ? 30 : 90);
            now.setDate(now.getDate() + days); word.nextRepDate = now.toISOString();
        }

        function startCorrection() {
            activeList = words.filter(w => w.errorCount >= 5);
            if(activeList.length === 0) return alert("Շտկելու բան չկա:");
            activeIndex = 0; document.getElementById('smart-menu').classList.add('hidden'); document.getElementById('view').classList.remove('hidden');
            renderCorrectionCard();
        }

        function renderCorrectionCard() {
            const word = activeList[activeIndex % activeList.length];
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center">
                    <div class="mb-10 bg-emerald-800 rounded-[3.5rem] p-12 shadow-2xl border-b-8 border-rose-500">
                        <h2 class="text-6xl font-black text-white mb-6 italic">${word.en}</h2>
                        <h3 onclick="this.classList.toggle('revealed')" class="text-3xl font-bold text-rose-900 blur-text italic">${word.hy}</h3>
                    </div>
                    <div class="grid grid-cols-2 gap-5 w-full">
                        <button onclick="handleCorrection(true)" class="btn-primary">ԳԻՏԵՄ</button>
                        <button onclick="handleCorrection(false)" class="btn-primary !bg-emerald-900">ՉԳԻՏԵՄ</button>
                    </div>
                </div>`;
            speak(word.en);
        }

        function handleCorrection(known) {
            const word = activeList[activeIndex % activeList.length];
            if(known) { word.score = Math.min(10, word.score + 1); if(word.score >= 10) { word.errorCount = 0; word.score = 0; activeList.splice(activeIndex % activeList.length, 1); showConfetti(); } else activeIndex++; triggerHaptic(); }
            else { word.score = Math.max(0, word.score - 1); activeIndex++; triggerHaptic(); }
            saveProgress(); if(activeList.length > 0) renderCorrectionCard(); else exitToMenu();
        }

        function openStatsStage() {
            document.getElementById('app-content').classList.add('hidden');
            document.getElementById('smart-menu').classList.remove('hidden');
            const container = document.getElementById('smart-container');
            
            const learnedWords = words.filter(w => w.isInstant || [2,3,4,5,6].every(s => w.stagesCompleted.includes(s)));
            const learnedCount = learnedWords.length;
            const avgExam = examScores.length ? Math.round(examScores.reduce((a,b)=>a+b,0)/examScores.length) : 0;
            
            const goalProgress = Math.min(100, Math.round((dailyWordsCount / dailyGoal) * 100));
            const motivation = goalProgress >= 100 ? "Հիանալի է: Օրվա նպատակը կատարված է:" : `Մնացել է ${Math.max(0, dailyGoal - dailyWordsCount)} բառ այսօրվա նպատակին:`;

            container.innerHTML = `
                <div class="bg-emerald-800 p-6 rounded-[2.5rem] shadow-2xl border-b-8 border-emerald-500 text-center mx-auto w-full">
                    <h2 class="text-lg font-black mb-3 italic uppercase text-emerald-300">Օրական Նպատակ</h2>
                    <div class="relative w-24 h-24 mx-auto mb-3">
                        <svg class="w-full h-full" viewBox="0 0 36 36">
                            <path class="text-emerald-900" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="text-emerald-400" stroke-dasharray="${goalProgress}, 100" stroke-width="3" stroke-linecap="round" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <div class="absolute inset-0 flex flex-col items-center justify-center">
                            <span class="text-xl font-black" id="daily-count-anim">${dailyWordsCount}</span>
                            <span class="text-[7px] uppercase font-bold text-emerald-400">բառ</span>
                        </div>
                    </div>
                    <p class="text-xs font-bold text-emerald-100 mb-4 italic">${motivation}</p>
                    <div class="flex items-center justify-center gap-3">
                        <span class="text-[10px] font-bold uppercase">Նպատակ:</span>
                        <input type="number" value="${dailyGoal}" onchange="updateDailyGoal(this.value)" class="w-16 p-1 rounded-xl text-center font-black bg-emerald-900 border border-emerald-700 text-sm">
                    </div>
                </div>

                <div class="bg-emerald-900 p-6 rounded-[2.5rem] shadow-2xl border border-emerald-700">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-emerald-800 p-3 rounded-2xl text-center">
                            <span class="block text-xl font-black text-emerald-400" id="learned-count-anim">0</span>
                            <span class="text-[9px] uppercase font-bold text-emerald-200 tracking-widest">Սովորած</span>
                        </div>
                        <div class="bg-emerald-800 p-3 rounded-2xl text-center">
                            <span class="block text-xl font-black text-emerald-400">${avgExam}%</span>
                            <span class="text-[9px] uppercase font-bold text-emerald-200 tracking-widest">Քննություն</span>
                        </div>
                    </div>
                </div>

                <div class="bg-emerald-900 p-5 rounded-[2.5rem] shadow-2xl border border-emerald-700">
                    <h3 class="font-black text-emerald-300 text-[10px] mb-3 uppercase tracking-widest italic text-center">Սովորած բառերի ցանկ</h3>
                    <div class="max-h-60 overflow-y-auto space-y-2 pr-1 custom-scroll">
                        ${learnedWords.length === 0 ? '<p class="text-center text-emerald-600 italic py-6 text-sm">Դեռ սովորած բառեր չկան</p>' : 
                          learnedWords.map(w => `
                            <div class="flex justify-between items-center p-3 bg-emerald-800/50 rounded-2xl border border-emerald-700/50">
                                <div>
                                    <div class="font-black text-white text-sm">${w.en}</div>
                                    <div class="text-[9px] text-emerald-400 font-bold">${w.hy}</div>
                                </div>
                                <div class="flex gap-1">
                                    ${w.isInstant ? '<span class="text-[9px] font-black text-yellow-400">INSTANT</span>' : 
                                      '<span class="text-yellow-400 text-sm">★★★★★</span>'}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            // Animate numbers
            animateNumber(document.getElementById('learned-count-anim'), 0, learnedCount, 800);
            animateNumber(document.getElementById('daily-count-anim'), 0, dailyWordsCount, 800);
        }

        function updateDailyGoal(val) {
            dailyGoal = Math.max(1, Math.min(100, parseInt(val) || 20));
            saveProgress();
            openStatsStage();
        }

        function openExam() {
            activeList = [...words].sort(() => 0.5 - Math.random()).slice(0, 50);
            activeIndex = 0; document.getElementById('app-content').classList.add('hidden'); document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = "Քննություն";
            renderExamStep(0);
        }

        function renderExamStep(correctCount) {
            if(activeIndex >= activeList.length) {
                const scorePct = Math.round((correctCount/activeList.length)*100);
                examScores.push(scorePct); saveProgress(); return renderFinish(`Արդյունք: ${scorePct}%`);
            }
            const word = activeList[activeIndex];
            document.getElementById('content').innerHTML = `
                <div class="w-full text-center">
                    <p class="text-xs font-bold text-emerald-400 mb-6 uppercase tracking-widest">${activeIndex+1} / ${activeList.length}</p>
                    <h2 class="text-6xl font-black text-white mb-10 italic">${word.en}</h2>
                    <input type="text" id="exam-in" autofocus class="w-full p-6 border-4 border-emerald-800 rounded-3xl text-center text-xl mb-8 outline-none" placeholder="..." autocomplete="off">
                    <button id="ex-btn" class="btn-primary">ՀԱՋՈՐԴԸ</button>
                </div>`;
            setTimeout(() => document.getElementById('exam-in').focus(), 50);
            document.getElementById('ex-btn').onclick = () => { 
                if(cleanText(document.getElementById('exam-in').value) === cleanText(word.hy)) {
                    correctCount++; 
                    triggerHaptic();
                } else triggerHaptic();
                activeIndex++; 
                renderExamStep(correctCount); 
            };
        }

        function renderFinish(extra = "") {
            document.getElementById('content').innerHTML = `
                <div class="text-center p-12 bg-emerald-800 rounded-[3.5rem] shadow-2xl w-full border-b-8 border-emerald-500">
                    <div class="text-7xl mb-6">🏆</div>
                    <h2 class="text-3xl font-black mb-4 text-white italic">Գերազանց է</h2>
                    <p class="text-emerald-200 mb-8 font-bold">${extra || "Բաժինը հաջողությամբ անցաք:"}</p>
                    <button onclick="exitToMenu()" class="btn-primary">ՎԵՐԱԴԱՌՆԱԼ</button>
                </div>`;
            showConfetti();
        }

        function exitToMenu() {
            document.querySelectorAll('#view, #smart-menu').forEach(el => el.classList.add('hidden'));
            document.getElementById('app-content').classList.remove('hidden');
            window.speechSynthesis.cancel(); updateStats();
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text); msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function showDeleteModal() { document.getElementById('delete-modal').classList.remove('hidden'); }
        function hideDeleteModal() { document.getElementById('delete-modal').classList.add('hidden'); }
        function confirmFinalDelete() { localStorage.removeItem('usanim_v3_data'); location.reload(); }

        initApp();
    </script>
</body>
</html>
