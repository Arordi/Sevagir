    <!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Usanim - English A1 (895 Words)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; user-select: none; touch-action: manipulation; }
        .stage-card { transition: all 0.2s ease; border: 2px solid transparent; cursor: pointer; }
        .stage-card:active { transform: scale(0.95); background-color: #f1f5f9; }
        .match-box { border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; cursor: pointer; min-height: 60px; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
        .match-selected { border-color: #3b82f6; background-color: #eff6ff; }
        .match-correct { border-color: #22c55e; background-color: #f0fdf4; pointer-events: none; opacity: 0.6; }
        .match-wrong { border-color: #ef4444; background-color: #fef2f2; animation: shake 0.3s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        input { font-size: 16px !important; }
        #progress-bar { transition: width 0.5s ease-in-out; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative">

    <div class="bg-indigo-600 p-4 text-white sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center mb-2">
            <div onclick="exitToMenu()" class="cursor-pointer">
                <h1 class="font-bold text-lg">Usanim A1</h1>
                <p id="progress-text" class="text-[10px] opacity-80">Բեռնվում է...</p>
            </div>
            <button onclick="resetData()" class="text-[10px] bg-indigo-700 hover:bg-indigo-800 px-2 py-1 rounded transition">Reset</button>
        </div>
        <div class="w-full bg-indigo-900 rounded-full h-1.5">
            <div id="progress-bar" class="bg-emerald-400 h-1.5 rounded-full" style="width: 0%"></div>
        </div>
    </div>

    <div id="menu" class="p-4 grid grid-cols-2 gap-4">
        <button onclick="openStage(1)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center">
            <span class="text-3xl block mb-2">🗂️</span>
            <span class="font-bold text-sm">Փուլ 1</span>
            <p class="text-[10px] text-gray-400">Flashcards</p>
        </button>
        <button onclick="openStage(2)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center">
            <span class="text-3xl block mb-2">🔘</span>
            <span class="font-bold text-sm">Փուլ 2</span>
            <p class="text-[10px] text-gray-400">Ընտրություն</p>
        </button>
        <button onclick="openStage(3)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center">
            <span class="text-3xl block mb-2">🧩</span>
            <span class="font-bold text-sm">Փուլ 3</span>
            <p class="text-[10px] text-gray-400">Match 5-5</p>
        </button>
        <button onclick="openStage(4)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center">
            <span class="text-3xl block mb-2">⌨️</span>
            <span class="font-bold text-sm">Փուլ 4</span>
            <p class="text-[10px] text-gray-400">Ուղղագրություն</p>
        </button>
        <button onclick="openStage(5)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center">
            <span class="text-3xl block mb-2">🔄</span>
            <span class="font-bold text-sm">Փուլ 5</span>
            <p class="text-[10px] text-gray-400">Թարգմանություն</p>
        </button>
        <button onclick="openStage(6)" class="stage-card p-4 bg-white shadow-sm rounded-2xl border-gray-100 flex flex-col items-center">
            <span class="text-3xl block mb-2">🎧</span>
            <span class="font-bold text-sm">Փուլ 6</span>
            <p class="text-[10px] text-gray-400">Լսողություն</p>
        </button>
        <button onclick="openStage(7)" class="stage-card p-6 bg-indigo-50 border-indigo-200 rounded-2xl col-span-2 shadow-inner flex flex-col items-center">
            <span class="text-3xl block mb-1">🎓</span>
            <span class="font-bold text-indigo-700">Փուլ 7: Քննություն (100)</span>
        </button>
        <button onclick="openStage(8)" class="stage-card p-6 bg-emerald-50 border-emerald-200 rounded-2xl col-span-2 shadow-inner flex flex-col items-center">
            <span class="text-3xl block mb-1">📊</span>
            <span class="font-bold text-emerald-700">Փուլ 8: Արդյունքներ</span>
        </button>
    </div>

    <div id="view" class="hidden p-4 min-h-[80vh]">
        <div class="flex justify-between items-center mb-6">
            <button onclick="exitToMenu()" class="text-indigo-600 font-bold flex items-center">
                <span class="mr-1">🏠</span> Մենյու
            </button>
            <div id="view-title" class="text-xs font-bold text-gray-400 uppercase tracking-widest"></div>
        </div>
        <div id="content" class="flex flex-col items-center w-full"></div>
    </div>

    <script>
        let words = [];
        let activeStage = 1;
        let activeIndex = 0;
        let activeList = [];
        let matchSelected = null;
        let examScore = 0;

        async function initApp() {
            try {
                const response = await fetch('./vocabulary.json');
                if (!response.ok) throw new Error("File not found");
                const data = await response.json();
                
                words = data.map((item, index) => ({
                    id: item.id || index,
                    en: item.word,
                    hy: item.translation,
                    tr: item.transcription || "",
                    audio: item.audio || "",
                    score: 0
                }));

                loadProgress();
                updateOverallProgress();
            } catch (error) {
                console.error("Init Error:", error);
                document.getElementById('progress-text').innerText = "Տվյալները բացակայում են կամ սխալ են";
            }
        }

        function loadProgress() {
            const saved = localStorage.getItem('usanim_data');
            if(saved) {
                const parsed = JSON.parse(saved);
                words.forEach(w => { if(parsed[w.id] !== undefined) w.score = parsed[w.id]; });
            }
        }

        function saveProgress() {
            const progress = {};
            words.forEach(w => progress[w.id] = w.score);
            localStorage.setItem('usanim_data', JSON.stringify(progress));
            updateOverallProgress();
        }

        function updateOverallProgress() {
            const learned = words.filter(w => w.score >= 10).length;
            const percent = words.length > 0 ? (learned / words.length) * 100 : 0;
            document.getElementById('progress-text').innerText = `Յուրացված: ${learned} / ${words.length}`;
            document.getElementById('progress-bar').style.width = percent + "%";
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;
            window.speechSynthesis.speak(msg);
        }

        function openStage(num) {
            activeStage = num;
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('view').classList.remove('hidden');
            document.getElementById('view-title').innerText = num === 8 ? "ԱՐԴՅՈՒՆՔՆԵՐ" : `ՓՈՒԼ ${num}`;
            initStageLogic();
        }

        function exitToMenu() {
            document.getElementById('view').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            window.speechSynthesis.cancel();
        }

        function initStageLogic() {
            activeIndex = 0;
            const container = document.getElementById('content');
            container.innerHTML = "";

            if(activeStage === 1) {
                activeList = words.filter(w => w.score < 10);
                renderStage1();
            } else if (activeStage >= 2 && activeStage <= 6) {
                activeList = words.filter(w => w.score < 10).slice(0, 10);
                renderLearningStages();
            } else if (activeStage === 7) {
                examScore = 0;
                activeList = [...words].sort(() => 0.5 - Math.random()).slice(0, 100);
                renderExam();
            } else if (activeStage === 8) {
                renderStage8();
            }
        }

        function renderStage1() {
            const container = document.getElementById('content');
            if(activeList.length === 0 || activeIndex >= activeList.length) {
                container.innerHTML = `<div class='text-center p-10'><h2 class='text-xl font-bold mb-4 text-emerald-600'>🎉 Բոլորը յուրացված են</h2><button onclick='exitToMenu()' class='bg-indigo-600 text-white px-6 py-2 rounded-xl'>Մենյու</button></div>`;
                return;
            }
            const word = activeList[activeIndex];
            container.innerHTML = `
                <div class="mb-4 text-[10px] font-bold text-gray-400 uppercase">Բառ ${activeIndex + 1} / ${activeList.length}</div>
                <div class="w-full bg-white border-2 border-indigo-100 rounded-3xl p-8 text-center shadow-lg mb-6 cursor-pointer active:bg-indigo-50" onclick="speak('${word.en}')">
                    <h2 class="text-5xl font-black text-indigo-600 mb-2">${word.en}</h2>
                    <p class="text-blue-400 text-lg mb-4">${word.tr}</p>
                    <hr class="mb-4 border-indigo-50">
                    <h3 class="text-3xl font-bold text-slate-800">${word.hy}</h3>
                </div>
                <div class="grid grid-cols-2 gap-4 w-full">
                    <button onclick="flashcardAction(true)" class="bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">ԳԻՏԵՄ</button>
                    <button onclick="flashcardAction(false)" class="bg-rose-500 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition">ՉԳԻՏԵՄ</button>
                </div>
            `;
            speak(word.en);
        }

        function flashcardAction(known) {
            const word = activeList[activeIndex];
            if(known) { word.score = 10; saveProgress(); }
            activeIndex++; 
            renderStage1();
        }

        function renderLearningStages() {
            const container = document.getElementById('content');
            if (activeStage === 3) { renderMatch5(); return; }
            if (activeList.length === 0) {
                activeList = words.filter(w => w.score < 10).slice(0, 10);
            }
            if (activeList.length === 0) {
                container.innerHTML = `<div class='text-center p-10'><h2 class='text-xl font-bold mb-4 text-emerald-600'>Այս փուլն ավարտված է: 🎉</h2><button onclick='exitToMenu()' class='bg-indigo-600 text-white px-6 py-2 rounded-xl'>Մենյու</button></div>`;
                return;
            }

            const word = activeList[activeIndex % activeList.length];
            container.innerHTML = `<div id="task-area" class="w-full flex flex-col items-center"></div>`;
            const area = document.getElementById('task-area');

            if(activeStage === 2) {
                const opts = [word.hy, ...words.filter(w => w.id !== word.id).sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.hy)].sort(() => 0.5 - Math.random());
                area.innerHTML = `
                    <div class="text-center mb-8" onclick="speak('${word.en}')">
                        <p class="text-5xl font-black text-indigo-600">${word.en}</p>
                        <p class="text-gray-400">${word.tr}</p>
                    </div>
                    <div class="grid grid-cols-1 gap-3 w-full">
                        ${opts.map(o => `<button onclick="checkAns(this, '${o}', '${word.hy}')" class="bg-white border-2 p-4 rounded-xl font-bold shadow-sm active:bg-indigo-50">${o}</button>`).join('')}
                    </div>`;
                speak(word.en);
            } else {
                const isListen = activeStage === 6;
                const isTrans = activeStage === 5;
                const correctVal = isTrans ? word.hy : word.en;

                area.innerHTML = `
                    <div class="text-center mb-6">
                        ${isListen ? `<button onclick="speak('${word.en}')" class="text-6xl p-6 bg-indigo-50 rounded-full active:scale-90 transition">🔊</button>` : `<p class="text-4xl font-bold text-slate-700">${isTrans ? word.en : word.hy}</p>`}
                    </div>
                    <input type="text" id="userInput" class="w-full p-4 border-2 rounded-xl text-center text-2xl mb-4 outline-none focus:border-indigo-500" placeholder="..." autocomplete="off">
                    <button id="checkBtn" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold active:bg-indigo-700">ՍՏՈՒԳԵԼ</button>
                `;
                
                const input = document.getElementById('userInput');
                const btn = document.getElementById('checkBtn');

                const validate = () => {
                    if(input.value.trim().toLowerCase() === correctVal.toLowerCase()) {
                        input.classList.add('bg-emerald-100', 'border-emerald-500');
                        word.score++;
                        saveProgress();
                        setTimeout(() => {
                            if(word.score >= 10) activeList = activeList.filter(w => w.id !== word.id);
                            activeIndex++;
                            renderLearningStages();
                        }, 600);
                    } else {
                        input.classList.add('match-wrong');
                        input.value = correctVal;
                        word.score = Math.max(0, word.score - 1);
                        saveProgress();
                        setTimeout(() => renderLearningStages(), 1500);
                    }
                };

                btn.onclick = validate;
                input.onkeydown = (e) => { if(e.key === 'Enter') validate(); };
                if(!isListen) speak(word.en);
                setTimeout(() => input.focus(), 200);
            }
        }

        function renderMatch5() {
            const container = document.getElementById('content');
            const batch = activeList.slice(0, 5);
            if(batch.length === 0) { exitToMenu(); return; }
            const enL = [...batch].sort(() => 0.5 - Math.random());
            const hyL = [...batch].sort(() => 0.5 - Math.random());
            container.innerHTML = `
                <p class="mb-4 text-xs font-bold text-gray-400">ԳՏԻՐ ԶՈՒՅԳԵՐԸ</p>
                <div class="grid grid-cols-2 gap-3 w-full">
                    <div class="flex flex-col gap-2">${enL.map(w => `<div class="match-box bg-white shadow-sm" data-type="en" data-id="${w.id}" onclick="handleM(this)">${w.en}</div>`).join('')}</div>
                    <div class="flex flex-col gap-2">${hyL.map(w => `<div class="match-box bg-white shadow-sm" data-type="hy" data-id="${w.id}" onclick="handleM(this)">${w.hy}</div>`).join('')}</div>
                </div>`;
        }

        function handleM(el) {
            if(el.classList.contains('match-correct') || el === matchSelected) return;
            if(!matchSelected) { matchSelected = el; el.classList.add('match-selected'); }
            else {
                if(matchSelected.dataset.id === el.dataset.id && matchSelected.dataset.type !== el.dataset.type) {
                    el.classList.add('match-correct');
                    matchSelected.classList.add('match-correct');
                    speak(words.find(w => w.id == el.dataset.id).en);
                    matchSelected = null;
                    if(document.querySelectorAll('.match-correct').length === (activeList.slice(0, 5).length * 2)) {
                        activeList.slice(0, 5).forEach(w => w.score++);
                        saveProgress();
                        setTimeout(() => { activeList = words.filter(w => w.score < 10).slice(0, 10); renderMatch5(); }, 800);
                    }
                } else {
                    el.classList.add('match-wrong'); matchSelected.classList.add('match-wrong');
                    const prev = matchSelected;
                    setTimeout(() => { el.classList.remove('match-wrong', 'match-selected'); prev.classList.remove('match-wrong', 'match-selected'); }, 500);
                    matchSelected = null;
                }
            }
        }

        function checkAns(btn, chosen, correct) {
            const word = activeList[activeIndex % activeList.length];
            if(chosen === correct) {
                btn.classList.add('bg-emerald-500', 'text-white');
                word.score++;
                saveProgress();
                setTimeout(() => {
                    if(word.score >= 10) activeList = activeList.filter(w => w.id !== word.id);
                    activeIndex++;
                    renderLearningStages();
                }, 600);
            } else {
                btn.classList.add('match-wrong');
                word.score = Math.max(0, word.score - 1);
                saveProgress();
                setTimeout(() => renderLearningStages(), 1000);
            }
        }

        function renderExam() {
            const container = document.getElementById('content');
            if(activeIndex >= activeList.length) {
                container.innerHTML = `<div class='text-center p-8 bg-indigo-50 rounded-3xl w-full'><h2 class='text-2xl font-black mb-4 uppercase'>Արդյունք</h2><p class='text-6xl font-black text-indigo-600 mb-6'>${examScore}/100</p><button onclick='exitToMenu()' class='bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold'>ՎԵՐԱԴԱՌՆԱԼ</button></div>`;
                return;
            }
            const word = activeList[activeIndex];
            const opts = [word.hy, ...words.filter(w => w.id !== word.id).sort(() => 0.5 - Math.random()).slice(0, 3).map(w => w.hy)].sort(() => 0.5 - Math.random());
            container.innerHTML = `<div class="mb-4 text-xs font-bold text-gray-400">ՀԱՐՑ ${activeIndex+1}/100</div><div class="text-center mb-8"><p class="text-5xl font-black text-indigo-600">${word.en}</p></div>
            <div class="grid grid-cols-1 gap-3 w-full">${opts.map(o => `<button onclick="handleExamAns(this, '${o}', '${word.hy}')" class="bg-white border-2 p-4 rounded-xl font-bold shadow-sm active:bg-indigo-50">${o}</button>`).join('')}</div>`;
            speak(word.en);
        }

        function handleExamAns(btn, chosen, correct) {
            if(chosen === correct) { examScore++; btn.classList.add('bg-emerald-500', 'text-white'); }
            else { btn.classList.add('bg-rose-500', 'text-white'); }
            setTimeout(() => { activeIndex++; renderExam(); }, 300);
        }

        function renderStage8() {
            const container = document.getElementById('content');
            container.innerHTML = `<div class="w-full space-y-2 pb-10">` + words.map((w, i) => `
                <div class="flex justify-between items-center bg-white p-3 rounded-xl border ${w.score >= 10 ? 'border-emerald-200 bg-emerald-50' : 'border-gray-100'}">
                    <div onclick="speak('${w.en}')" class="cursor-pointer">
                        <p class="font-bold text-indigo-700 text-sm">${i+1}. ${w.en}</p>
                        <p class="text-[10px] text-gray-500">${w.hy}</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <div class="w-12 bg-gray-200 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-emerald-500 h-full" style="width: ${w.score * 10}%"></div>
                        </div>
                        <span class="text-[10px] font-bold text-gray-400">${w.score}/10</span>
                    </div>
                </div>
            `).join('') + `</div>`;
        }

        function resetData() {
            if(confirm("Ջնջե՞լ ամբողջ առաջընթացը:")) {
                localStorage.removeItem('usanim_data');
                location.reload();
            }
        }

        initApp();
    </script>
</body>
</html>
